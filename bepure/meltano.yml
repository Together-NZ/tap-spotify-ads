version: 1
default_environment: prod
project_id: 2de0b6f6-586c-4cae-828a-f4b265302e9e
environments:
- name: dev
- name: staging
- name: prod
state_backend:
  uri: gs://bepure-main-meltano-state-staging
plugins:
  extractors:
  - name: tap-facebook
    variant: airbyte
    pip_url: git+https://github.com/MeltanoLabs/tap-airbyte-wrapper.git setuptools<82.0
    config:
      airbyte_config:
        start_date: ${START_DATE}T00:00:00Z
    select:
    - ads_insights.*
    - ad_account.*
    - ad_sets.*
    - ads.*
    - campaigns.*
  - name: tap-ttd
    namespace: tap-ttd
    pip_url: git+https://github.com/Together-NZ/tap-ttd.git setuptools<82.0
    executable: tap-ttd
    config:
      api_key: ${TAP_TTD_API_KEY}
      start_date: ${START_DATE}
      end_date:
      manual: false
      advertiser_id: on3qsjc
  - name: tap-ga4
    variant: meltanolabs
    pip_url: git+https://github.com/MeltanoLabs/tap-google-analytics.git setuptools<82.0
    config:
      reports: ${GA4_REPORTS}
      start_date: ${START_DATE}
      keep_empty_rows: true
      select:
      - ${GA4_GOAL}
  - name: tap-tiktok
    variant: gthesheep
    pip_url: git+https://github.com/gthesheep/tap-tiktok.git setuptools<82.0
    config:
      start_date: ${START_DATE}
  - name: tap-dv360
    namespace: tap-dv360
    pip_url: git+https://github.com/Together-NZ/tap-dv360.git setuptools<82.0
    executable: tap-dv360
    capabilities:
    - state
    - catalog
    - discover
    - about
    - stream-maps
    config:
      start_date: ${START_DATE}
      advertiser_id: '1252167246'
      query_standard: query_standard.json
      query_youtube: query_youtube.json
      service_account: together-meltano@together-internal.iam.gserviceaccount.com
  loaders:
  - name: target-jsonl
    variant: andyh1203
    pip_url: target-jsonl
  - name: target-bigquery
    variant: z3z1ma
    pip_url: git+https://github.com/z3z1ma/target-bigquery.git setuptools<82.0
    config:
      dataset: ${BQ_DATASET}
      project: bepure-main
      location: australia-southeast1
      denormalized: false
      schema_resolver_version: 2
      column_name_transforms:
        add_underscore_when_invalid: true
        lower: true
        snake_case: true
      fail_fast: false
      method: ${BQ_METHOD}
      bucket: australia-southeast1-meltan-00c049c-bigquery-staging
  orchestrators:
  - name: airflow
    variant: apache
    pip_url: apache-airflow==2.10.5 --constraint https://raw.githubusercontent.com/apache/airflow/constraints-2.10.5/constraints-${MELTANO__PYTHON_VERSION}.txt
  transformers:
  - name: dbt-bigquery
    variant: dbt-labs
    pip_url: dbt-core~=1.3.0 dbt-bigquery~=1.3.0 setuptools<82.0
    config:
      project: bepure-main
      method: oauth
    commands:
      ttd_bepure_models:
        args: run --select ttd__bepure
      cm360_models:
        args: run --select cm360_seralized cm360_direct_buy
      dv360_models:
        args: run --select dv360_standard dv360_youtube
      facebook_bepure_models:
        args: run --select facebook__bepure
      facebook_eve_wellness_models:
        args: run --select facebook__eve_wellness
      facebook_eve_wellness_au_models:
        args: run --select facebook__eve_wellness_au
      ga4_eve_wellness_goal_models:
        args: run --select ga4_goal_a__eve_wellness ga4_goal_channel__eve_wellness
      ga4_eve_wellness_ecommerce_models:
        args: run --select ga4_goal_ecommerce__eve_wellness
      ga4_eve_wellness_au_goal_models:
        args: run --select ga4_goal_a__eve_wellness_au ga4_goal_channel__eve_wellness_au
      ga4_eve_wellness_au_ecommerce_models:
        args: run --select ga4_goal_ecommerce__eve_wellness_au
      ga4_bepure_goal_models:
        args: run --select ga4_goal_a__bepure ga4_goal_channel__bepure
      ga4_bepure_ecommerce_models:
        args: run --select ga4_goal_ecommerce__bepure
      google_ads_bepure_models:
        args: run --select google_ads_search__bepure google_ads_demand__bepure
      google_ads_eve_wellness_models:
        args: run --select google_ads_search__eve_wellness google_ads_demand__eve_wellness
      google_ads_eve_wellness_au_models:
        args: run --select google_ads_search__eve_wellness_au google_ads_demand__eve_wellness_au
      tiktok_eve_wellness_models:
        args: run --select tiktok__eve_wellness
elt:
  buffer_size: 52428800
