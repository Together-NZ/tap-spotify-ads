version: 1
default_environment: prod
project_id: 123b8fab-a351-4b3e-a547-d5446bd5cc7c
environments:
- name: dev
- name: staging
- name: prod
#state_backend:
#  uri: gs://uowaikato-main-meltano-state-staging
plugins:
  extractors:
  # university of waikato:
  - name: tap-ttd
    namespace: tap-ttd
    pip_url: git+https://github.com/Together-NZ/tap-ttd.git setuptools<82.0
    executable: tap-ttd
    config:
      api_key: ${TAP_TTD_API_KEY}
      start_date: ${START_DATE}
      end_date:
      manual: false
      advertiser_id: ao3nvmu
  - name: tap-dv360
    namespace: tap-dv360
    pip_url: git+https://github.com/Together-NZ/tap-dv360.git setuptools<82.0
    executable: tap-dv360
    capabilities:
    - state
    - catalog
    - discover
    - about
    - stream-maps
    config:
      start_date: ${START_DATE}
      advertiser_id: '532521343'
      query_standard: dv360_standard.json
      query_youtube: dv360_youtube.json
      service_account: together-meltano@together-internal.iam.gserviceaccount.com
  - name: tap-tiktok
    variant: gthesheep
    pip_url: git+https://github.com/gthesheep/tap-tiktok.git setuptools<82.0
    config:
      start_date: ${START_DATE}
  - name: tap-snapchat-ads
    namespace: tap-snapchat-ads
    pip_url: git+https://github.com/Together-NZ/tap_snapchat_ads.git pyhumps setuptools<82.0
    executable: tap-snapchat-ads
    capabilities:
    - catalog
    config:
      client_id: ${TAP_SNAPCHAT_ADS_CLIENT_ID}
      client_secret: ${TAP_SNAPCHAT_ADS_CLIENT_SECRET}
      refresh_token: ${TAP_SNAPCHAT_ADS_REFRESH_TOKEN}
      start_date: ${START_DATE}T00:00:00Z
      user_agent: Meltano
      org_account_ids: ${TAP_SNAPCHAT_ADS_ORG_ACCOUNT_IDS}
      ad_account_ids: ${TAP_SNAPCHAT_ADS_AD_ACCOUNT_IDS}
    select:
      - ad_stats_daily
      - ads 
      - ad_squads
      - campaigns
    catalog: snapchat_catalog.json
  - name: tap-ga4
    variant: meltanolabs
    pip_url: git+https://github.com/MeltanoLabs/tap-google-analytics.git setuptools<82.0
    config:
      reports: ./report.json
      start_date: ${START_DATE}
      keep_empty_rows: true
      select:
      - goal
  - name: tap-facebook
    variant: airbyte
    pip_url: git+https://github.com/MeltanoLabs/tap-airbyte-wrapper.git setuptools<82.0
    config:
      airbyte_config:
        start_date: ${START_DATE}T00:00:00Z
    select:
    - ads_insights.*
    - ad_account.*
    - ad_sets.*
    - ads.*
    - campaigns.*
    - custom_conversions.*

  - name: tap-linkedin-ads
    namespace: tap-linkedin-ads
    pip_url: git+https://github.com/Together-NZ/tap-linkedin.git setuptools<82.0
    executable: tap-linkedin-ads
    capabilities:
    - state
    - catalog
    - discover
    - about
    - stream-maps
    config:
      access_token: ${TAP_LINKEDIN_ADS_ACCESS_TOKEN}
      refresh_token: ${TAP_LINKEDIN_ADS_REFRESH_TOKEN}
      client_id: ${TAP_LINKEDIN_ADS_CLIENT_ID}
      client_secret: ${TAP_LINKEDIN_ADS_CLIENT_SECRET}
      accounts: '503820360'
      user_agent: agent
      start_date: ${START_DATE}
      _catalog_path: ./catalog.json
    select:
    - campaigns.*
    - creatives.*
    - campaign_groups.*
    - ad_analytics_by_creative.*
  loaders:
  - name: target-jsonl
    variant: andyh1203
    pip_url: target-jsonl
  - name: target-bigquery
    variant: z3z1ma
    pip_url: git+https://github.com/z3z1ma/target-bigquery.git setuptools<82.0
    config:
      dataset: ${BQ_DATASET}
      project: uowaikato-main
      location: australia-southeast1
      denormalized: false
      schema_resolver_version: 2
      column_name_transforms:
        add_underscore_when_invalid: true
        lower: true
        snake_case: true
      fail_fast: false
      method: ${BQ_METHOD}
      bucket: australia-southeast1-meltan-00c049c-bigquery-staging
  transformers:
  - name: dbt-bigquery
    variant: dbt-labs
    pip_url: dbt-core~=1.3.0 dbt-bigquery~=1.3.0 setuptools<82.0
    commands:
      linkedin_models: run --select +linkedin
      tiktok_models:
        args: run --select +tiktok_ads_join
        description: Run the TikTok ads model
      snapchat_models:
        args: run --select +snapchat_ads
        description: Run the Snapchat ads model
      ga4_models:
        args: run --select +ga4_goal_a +ga4_goal_channel
        description: Run the Google Analytics models
      google_ads_models:
        args: run --select +google_ads
        description: Run the Google Ads model
      facebook_models:
        args: run --select +facebook
        description: Run the Facebook ads model
      dv360_models:
        args: run --select +dv360_standard +dv360_youtube
        description: Run the DV360 ads model
      ttd_models:
        args: run --select +ttd_seralized +ttd_transformed
        description: Run the TTD ads model
      cm360_models:
        args: run --select +cm360_seralized +cm360_direct_buy
        description: Run the CM360 ads model

elt:
  buffer_size: 52428800
