version: 2

# UoW BigQuery layout (see hardcoded refs in models). Defaults match `uowaikato-main.*`.
# Override with DBT_BIGQUERY_PROJECT and REFERENCE_* env vars per environment.
# `google_ads.sql` and CM360 raw models still point at `together-internal` in SQL; sources below
# document those for ref/source() migration — see google_ads_data_transfer / cm360_raw.

sources:

  - name: ga4_raw
    database: "{{ env_var('DBT_BIGQUERY_PROJECT', 'uowaikato-main') }}"
    schema: "{{ env_var('REFERENCE_GA4_RAW_BIGQUERY_DATASET', 'ga4_raw') }}"
    tables:
      - name: goal

  - name: dash_union
    database: "{{ env_var('DBT_BIGQUERY_PROJECT', 'uowaikato-main') }}"
    schema: "{{ env_var('REFERENCE_DASH_UNION_BIGQUERY_DATASET', 'dash_table') }}"
    tables:
      - name: dash_union
      - name: dash_table

  - name: dv360_raw
    database: "{{ env_var('DBT_BIGQUERY_PROJECT', 'uowaikato-main') }}"
    schema: "{{ env_var('REFERENCE_DV360_BIGQUERY_DATASET', 'dv360_raw') }}"
    tables:
      - name: dv360_standard
      - name: dv360_youtube

  - name: dv360_transformed
    database: "{{ env_var('DBT_BIGQUERY_PROJECT', 'uowaikato-main') }}"
    schema: "{{ env_var('REFERENCE_DV360_TRANSFORMED_BIGQUERY_DATASET', 'dv360_transformed') }}"
    tables:
      - name: dv360_standard
      - name: dv360_youtube

  - name: facebook_raw
    database: "{{ env_var('DBT_BIGQUERY_PROJECT', 'uowaikato-main') }}"
    schema: "{{ env_var('REFERENCE_META_BIGQUERY_DATASET', 'facebook_raw') }}"
    tables:
      - name: ads_insights
      - name: ad_sets
      - name: ads
      - name: campaigns
      - name: custom_conversions

  - name: facebook_transformed
    database: "{{ env_var('DBT_BIGQUERY_PROJECT', 'uowaikato-main') }}"
    schema: "{{ env_var('REFERENCE_META_TRANSFORMED_BIGQUERY_DATASET', 'facebook_transformed') }}"
    tables:
      - name: facebook

  - name: linkedin_raw
    database: "{{ env_var('DBT_BIGQUERY_PROJECT', 'uowaikato-main') }}"
    schema: "{{ env_var('REFERENCE_LINKEDIN_BIGQUERY_DATASET', 'linkedin_raw') }}"
    tables:
      - name: ad_analytics_by_creative
      - name: creatives
      - name: campaigns
      - name: campaign_groups

  - name: linkedin_transformed
    database: "{{ env_var('DBT_BIGQUERY_PROJECT', 'uowaikato-main') }}"
    schema: "{{ env_var('REFERENCE_LINKEDIN_TRANSFORMED_BIGQUERY_DATASET', 'linkedin_transformed') }}"
    tables:
      - name: linkedin

  - name: ttd_raw
    database: "{{ env_var('DBT_BIGQUERY_PROJECT', 'uowaikato-main') }}"
    schema: "{{ env_var('REFERENCE_TTD_TRANSFORMED_BIGQUERY_DATASET', 'ttd_raw') }}"
    tables:
      - name: standard_streams

  - name: ttd_transformed
    database: "{{ env_var('DBT_BIGQUERY_PROJECT', 'uowaikato-main') }}"
    schema: "{{ env_var('REFERENCE_TTD_TRANSFORMED_BIGQUERY_DATASET', 'ttd_transformed') }}"
    tables:
      - name: ttd_transformed

  - name: tiktok_raw
    database: "{{ env_var('DBT_BIGQUERY_PROJECT', 'uowaikato-main') }}"
    schema: "{{ env_var('REFERENCE_TIKTOK_BIGQUERY_DATASET', 'tiktok_raw') }}"
    tables:
      - name: ads
      - name: ads_basic_data_metrics_by_day
      - name: ads_video_play_metrics_by_day

  - name: tiktok_transformed
    database: "{{ env_var('DBT_BIGQUERY_PROJECT', 'uowaikato-main') }}"
    schema: "{{ env_var('REFERENCE_TIKTOK_TRANSFORMED_BIGQUERY_DATASET', 'tiktok_transformed') }}"
    tables:
      - name: tiktok

  - name: snapchat_raw
    database: "{{ env_var('DBT_BIGQUERY_PROJECT', 'uowaikato-main') }}"
    schema: "{{ env_var('REFERENCE_SNAPCHAT_BIGQUERY_DATASET', 'snapchat_raw') }}"
    tables:
      - name: ad_stats_daily
      - name: ads
      - name: ad_squads
      - name: campaigns

  - name: snapchat_transformed
    database: "{{ env_var('DBT_BIGQUERY_PROJECT', 'uowaikato-main') }}"
    schema: "{{ env_var('REFERENCE_SNAPCHAT_TRANSFORMED_BIGQUERY_DATASET', 'snapchat_transformed') }}"
    tables:
      - name: snapchat

  - name: google_ads
    database: "{{ env_var('DBT_BIGQUERY_PROJECT', 'uowaikato-main') }}"
    schema: "{{ env_var('REFERENCE_GOOGLE_ADS_TRANSFORMED_BIGQUERY_DATASET', 'google_ads_transformed') }}"
    tables:
      - name: google_ads

  - name: cm360_transformed
    database: "{{ env_var('DBT_BIGQUERY_PROJECT', 'uowaikato-main') }}"
    schema: "{{ env_var('REFERENCE_CM360_TRANSFORMED_BIGQUERY_DATASET', 'cm360_transformed') }}"
    tables:
      - name: cm360_direct_buy
      - name: cm360_seralized


