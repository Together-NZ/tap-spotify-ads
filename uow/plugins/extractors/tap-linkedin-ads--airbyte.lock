{
  "plugin_type": "extractors",
  "name": "tap-linkedin-ads",
  "namespace": "tap_airbyte",
  "variant": "airbyte",
  "label": "Linkedin Ads",
  "docs": "https://hub.meltano.com/extractors/tap-linkedin-ads--airbyte",
  "repo": "https://github.com/airbytehq/airbyte/tree/master/airbyte-integrations/connectors/source-linkedin-ads",
  "pip_url": "git+https://github.com/MeltanoLabs/tap-airbyte-wrapper.git",
  "executable": "tap-airbyte",
  "description": "LinkedIn Ad Platform",
  "logo_url": "https://hub.meltano.com/assets/logos/extractors/linkedin-ads.png",
  "capabilities": [
    "about",
    "catalog",
    "discover",
    "schema-flattening",
    "state",
    "stream-maps"
  ],
  "settings_group_validation": [
    [
      "airbyte_spec.image",
      "connector_config.start_date"
    ]
  ],
  "settings": [
    {
      "name": "airbyte_config.account_ids",
      "kind": "array",
      "label": "Airbyte Config Account Ids",
      "description": "Specify the account IDs separated by a space, to pull the data from. Leave empty, if you want to pull the data from all associated accounts. See the <a href=\"https://www.linkedin.com/help/linkedin/answer/a424270/find-linkedin-ads-account-details?lang=en\">LinkedIn Ads docs</a> for more info."
    },
    {
      "name": "airbyte_config.credentials.access_token",
      "kind": "string",
      "label": "Airbyte Config Credentials Access Token",
      "description": "The token value generated using the authentication code. See the <a href=\"https://docs.airbyte.com/integrations/sources/linkedin-ads#authentication\">docs</a> to obtain yours.",
      "sensitive": true
    },
    {
      "name": "airbyte_config.credentials.auth_method",
      "kind": "string",
      "label": "Airbyte Config Credentials Auth Method",
      "description": "oAuth2.0, access_token"
    },
    {
      "name": "airbyte_config.credentials.client_id",
      "kind": "string",
      "label": "Airbyte Config Credentials Client Id",
      "description": "The client ID of the LinkedIn Ads developer application.",
      "sensitive": true
    },
    {
      "name": "airbyte_config.credentials.client_secret",
      "kind": "string",
      "label": "Airbyte Config Credentials Client Secret",
      "description": "The client secret the LinkedIn Ads developer application.",
      "sensitive": true
    },
    {
      "name": "airbyte_config.credentials.refresh_token",
      "kind": "string",
      "label": "Airbyte Config Credentials Refresh Token",
      "description": "The key to refresh the expired access token.",
      "sensitive": true
    },
    {
      "name": "airbyte_config.start_date",
      "kind": "string",
      "label": "Airbyte Config Start Date",
      "description": "UTC date in the format 2020-09-17. Any data before this date will not be replicated."
    },
    {
      "name": "airbyte_spec.image",
      "kind": "string",
      "value": "airbyte/source-linkedin-ads",
      "label": "Airbyte Spec Image",
      "description": "Airbyte image to run"
    },
    {
      "name": "airbyte_spec.tag",
      "kind": "string",
      "value": "latest",
      "label": "Airbyte Spec Tag",
      "description": "Airbyte image tag"
    },
    {
      "name": "docker_mounts",
      "kind": "array",
      "label": "Docker Mounts",
      "description": "Docker mounts to make available to the Airbyte container. Expects a list of maps containing source, target, and type as is documented in the docker --mount documentation"
    },
    {
      "name": "flattening_enabled",
      "kind": "boolean",
      "label": "Flattening Enabled",
      "description": "'True' to enable schema flattening and automatically expand nested properties."
    },
    {
      "name": "flattening_max_depth",
      "kind": "integer",
      "label": "Flattening Max Depth",
      "description": "The max depth to flatten schemas."
    },
    {
      "name": "stream_map_config",
      "kind": "object",
      "label": "Stream Map Config",
      "description": "User-defined config values to be used within map expressions."
    },
    {
      "name": "stream_maps",
      "kind": "object",
      "label": "Stream Maps",
      "description": "Config object for stream maps capability. For more information check out [Stream Maps](https://sdk.meltano.com/en/latest/stream_maps.html)."
    }
  ]
}
