{
  "plugin_type": "extractors",
  "name": "tap-snapchat-ads",
  "namespace": "tap_snapchat_ads",
  "variant": "singer-io",
  "label": "Snapchat Ads",
  "docs": "https://hub.meltano.com/extractors/tap-snapchat-ads--singer-io",
  "repo": "https://github.com/singer-io/tap-snapchat-ads",
  "pip_url": "tap-snapchat-ads",
  "description": "Social Media Platform",
  "logo_url": "https://hub.meltano.com/assets/logos/extractors/snapchat-ads.png",
  "capabilities": [
    "catalog",
    "discover",
    "state"
  ],
  "settings_group_validation": [
    [
      "client_id",
      "client_secret",
      "org_account_ids",
      "refresh_token",
      "start_date",
      "user_agent"
    ]
  ],
  "settings": [
    {
      "name": "client_id",
      "kind": "string",
      "label": "Client ID",
      "description": "Your client ID.",
      "sensitive": true
    },
    {
      "name": "client_secret",
      "kind": "string",
      "label": "Client Secret",
      "description": "Your client secret.",
      "sensitive": true
    },
    {
      "name": "omit_empty",
      "label": "Omit Empty",
      "description": "Omits records with zero data for all metrics for a given date/entity. If there is data for any metric for a given date/entity, all metrics for that date/entity are returned. A string representation of a boolean. Default, 'true'."
    },
    {
      "name": "org_account_ids",
      "kind": "array",
      "label": "Account IDs",
      "description": "An array of account IDs to sync."
    },
    {
      "name": "page_size",
      "kind": "integer",
      "label": "Page Size",
      "description": "The request page size. Default, 500."
    },
    {
      "name": "refresh_token",
      "kind": "string",
      "label": "Refresh Token",
      "description": "Your refresh token.",
      "sensitive": true
    },
    {
      "name": "request_timeout",
      "kind": "integer",
      "label": "Request Timeout",
      "description": "The time for which request should wait to get a response and the default request_timeout is 300 seconds."
    },
    {
      "name": "start_date",
      "kind": "date_iso8601",
      "label": "Start Date",
      "description": "Determines how much historical data will be extracted. Please be aware\n that the larger the time period and amount of data, the longer the initial extraction\n can be expected to take."
    },
    {
      "name": "swipe_up_attribution_window",
      "label": "Swipe Up Attribution Window",
      "description": "Attribution window for swipe ups. 1_DAY, 7_DAY, 28_DAY (default)."
    },
    {
      "name": "targeting_country_codes",
      "label": "Targeting Country Codes",
      "description": "Comma-delimited lists of lower-case 2-letter ISO Country Codes for Ads Targeting. Default, 'us'."
    },
    {
      "name": "user_agent",
      "label": "User Agent",
      "description": "The user agent to send with requests."
    },
    {
      "name": "view_attribution_window",
      "label": "View Attribution Window",
      "description": "Attribution window for views. 1_HOUR, 3_HOUR, 6_HOUR, 1_DAY (default), 7_DAY, 28_DAY."
    }
  ]
}