{
  "plugin_type": "extractors",
  "name": "tap-snapchat-ads",
  "namespace": "tap_airbyte",
  "variant": "airbyte",
  "label": "Snapchat Marketing",
  "docs": "https://hub.meltano.com/extractors/tap-snapchat-ads--airbyte",
  "repo": "https://github.com/airbytehq/airbyte/tree/master/airbyte-integrations/connectors/source-snapchat-marketing",
  "pip_url": "git+https://github.com/MeltanoLabs/tap-airbyte-wrapper.git",
  "executable": "tap-airbyte",
  "description": "Social Media Platform",
  "logo_url": "https://hub.meltano.com/assets/logos/extractors/snapchat-ads.png",
  "capabilities": [
    "about",
    "catalog",
    "discover",
    "schema-flattening",
    "state",
    "stream-maps"
  ],
  "settings_group_validation": [
    [
      "airbyte_config.client_id",
      "airbyte_config.client_secret",
      "airbyte_config.refresh_token",
      "airbyte_spec",
      "airbyte_spec.image"
    ]
  ],
  "settings": [
    {
      "name": "airbyte_config.client_id",
      "kind": "string",
      "label": "Airbyte Config Client Id",
      "description": "The Client ID of your Snapchat developer application.",
      "sensitive": true
    },
    {
      "name": "airbyte_config.client_secret",
      "kind": "string",
      "label": "Airbyte Config Client Secret",
      "description": "The Client Secret of your Snapchat developer application.",
      "sensitive": true
    },
    {
      "name": "airbyte_config.end_date",
      "kind": "string",
      "label": "Airbyte Config End Date",
      "description": "Date in the format 2017-01-25. Any data after this date will not be replicated."
    },
    {
      "name": "airbyte_config.refresh_token",
      "kind": "string",
      "label": "Airbyte Config Refresh Token",
      "description": "Refresh Token to renew the expired Access Token.",
      "sensitive": true
    },
    {
      "name": "airbyte_config.start_date",
      "kind": "string",
      "label": "Airbyte Config Start Date",
      "description": "Date in the format 2022-01-01. Any data before this date will not be replicated."
    },
    {
      "name": "airbyte_spec.image",
      "kind": "string",
      "value": "airbyte/source-snapchat-marketing",
      "label": "Airbyte Spec Image",
      "description": "Airbyte image to run"
    },
    {
      "name": "airbyte_spec.tag",
      "kind": "string",
      "value": "latest",
      "label": "Airbyte Spec Tag",
      "description": "Airbyte image tag"
    },
    {
      "name": "docker_mounts",
      "kind": "array",
      "label": "Docker Mounts",
      "description": "Docker mounts to make available to the Airbyte container. Expects a list of maps containing source, target, and type as is documented in the docker --mount documentation"
    },
    {
      "name": "flattening_enabled",
      "kind": "boolean",
      "label": "Flattening Enabled",
      "description": "'True' to enable schema flattening and automatically expand nested properties."
    },
    {
      "name": "flattening_max_depth",
      "kind": "integer",
      "label": "Flattening Max Depth",
      "description": "The max depth to flatten schemas."
    },
    {
      "name": "stream_map_config",
      "kind": "object",
      "label": "Stream Map Config",
      "description": "User-defined config values to be used within map expressions."
    },
    {
      "name": "stream_maps",
      "kind": "object",
      "label": "Stream Maps",
      "description": "Config object for stream maps capability. For more information check out [Stream Maps](https://sdk.meltano.com/en/latest/stream_maps.html)."
    }
  ]
}