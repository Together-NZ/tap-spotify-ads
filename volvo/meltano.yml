version: 1
default_environment: dev
project_id: 4f5340fe-b63b-41b8-8b8a-963749a65dc3
environments:
- name: dev
- name: staging
- name: prod
#state_backend:
#  uri: gs://volvo-meltano-state-staging
plugins:
  extractors:
  - name: tap-ttd
    namespace: tap-ttd
    pip_url: git+https://github.com/Together-NZ/tap-ttd.git setuptools<82.0
    executable: tap-ttd
    config:
      api_key: ${TAP_TTD_API_KEY}
      start_date: ${START_DATE}
      end_date:
      manual: false
      advertiser_id: 73sflvx
  - name: tap-ga4
    variant: meltanolabs
    pip_url: git+https://github.com/MeltanoLabs/tap-google-analytics.git setuptools<82.0
    config:
      reports: ./report.json
      start_date: ${START_DATE}
      keep_empty_rows: true
      select:
      - goal
  - name: tap-dv360
    namespace: tap-dv360
    pip_url: git+https://github.com/Together-NZ/tap-dv360.git setuptools<82.0
    executable: tap-dv360
    capabilities:
    - state
    - catalog
    - discover
    - about
    - stream-maps
    config:
      start_date: ${START_DATE}
      advertiser_id: '685375340'
      query_standard: dv360_standard.json
      query_youtube: dv360_youtube.json
      service_account: together-meltano@together-internal.iam.gserviceaccount.com
  - name: tap-facebook
    variant: airbyte
    pip_url: git+https://github.com/MeltanoLabs/tap-airbyte-wrapper.git setuptools<82.0
    config:
      airbyte_config:
        start_date: ${START_DATE}T00:00:00Z
    select:
    - ads_insights.*
    - ad_account.*
    - ad_sets.*
    - ads.*
    - campaigns.*
  - name: tap-hivestack
    namespace: tap-hivestack
    pip_url: git+ssh://git@github.com/Together-NZ/tap-hivestack.git setuptools<82.0
    executable: tap-hivestack
    config:
      api_key: ${TAP_HIVESTACK_API_KEY}
      report_id: '67753'
  - name: tap-linkedin-ads
    namespace: tap-linkedin-ads
    pip_url: git+https://github.com/Together-NZ/tap-linkedin.git setuptools<82.0
    executable: tap-linkedin-ads
    capabilities:
    - state
    - catalog
    - discover
    - about
    - stream-maps
    config:
      access_token: ${TAP_LINKEDIN_ADS_ACCESS_TOKEN}
      refresh_token: ${TAP_LINKEDIN_ADS_REFRESH_TOKEN}
      client_id: ${TAP_LINKEDIN_ADS_CLIENT_ID}
      client_secret: ${TAP_LINKEDIN_ADS_CLIENT_SECRET}
      accounts: '517061868'
      user_agent: agent
      start_date: ${START_DATE}
      _catalog_path: ./catalog.json
    select:
      - campaign_groups.*
      - creatives.*
      - campaigns.*
      - ad_analytics_by_creative.*
  loaders:
  - name: target-jsonl
    variant: andyh1203
    pip_url: target-jsonl
  - name: target-bigquery
    variant: z3z1ma
    pip_url: git+https://github.com/z3z1ma/target-bigquery.git setuptools<82.0
    config:
      dataset: ${BQ_DATASET}
      project: volvo-main
      location: australia-southeast1
      denormalized: false
      schema_resolver_version: 2
      column_name_transforms:
        add_underscore_when_invalid: true
        lower: true
        snake_case: true
      fail_fast: false
      method: ${BQ_METHOD}
      bucket: australia-southeast1-meltan-00c049c-bigquery-staging
  orchestrators:
  - name: airflow
    variant: apache
    pip_url: apache-airflow==2.10.5 --constraint 
      https://raw.githubusercontent.com/apache/airflow/constraints-2.10.5/constraints-${MELTANO__PYTHON_VERSION}.txt
  transformers:
  - name: dbt-bigquery
    variant: dbt-labs
    pip_url: dbt-core~=1.9.2 dbt-bigquery~=1.9.1 setuptools<82.0
    config:
      project: volvo-main
      location: australia-southeast1
      method: oauth
    commands:
      cm360_geely_models:
        args: run --select +cm360_seralized__geely +cm360_direct_buy__geely
        description: Run the CM360 ads model
      cm360_polestar_models:
        args: run --select +cm360_seralized__polestar +cm360_direct_buy__polestar
        description: Run the CM360 ads model
      cm360_volvo_models:
        args: run --select +cm360_seralized__volvo +cm360_direct_buy__volvo
        description: Run the CM360 ads model
      dv360_volvo_models:
        args: run --select +dv360_standard__volvo +dv360_youtube__volvo
        description: Run the DV360 ads model
      ttd_volvo_models:
        args: run --select +ttd_transformed__volvo
        description: Run the TTD ads model
      hivestack_volvo_models:
        args: run --select +hivestack__volvo
        description: Run the HiveStack model
      facebook_volvo_models:
        args: run --select +facebook__volvo
        description: Run the Facebook ads model
      facebook_geely_models:
        args: run --select +facebook__geely
      facebook_polestar_models:
        args: run --select +facebook__polestar
      ga4_volvo_models:
        args: run --select ga4_goal_a__volvo ga4_goal_channel__volvo
      linkedin_volvo_models:
        args: run --select +linkedin__volvo

  files:
  - name: files-airflow
    variant: meltano
    pip_url: git+https://github.com/meltano/files-airflow.git
