name: Docker Image CI

on:
  push:
    branches: [ "main" ]
    paths:
      - "uow/**"
  pull_request:
    branches: [ "main" ]
    paths:
      - "uow/**"
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Run docker.py
        working-directory: uow
        run: python docker.py
