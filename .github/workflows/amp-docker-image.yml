name: Docker Image CI

on:
  pull_request:
    branches: [ "main" ]
    paths:
      - "amp/**"

jobs:

  build:
    permissions:
      id-token: write
      contents: read

    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name : Authenticate to Google Cloud with Sevice Account
      id: auth
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: "projects/364275589560/locations/global/workloadIdentityPools/amp-pool-unique/providers/github-resource-pool"
        service_account: "impact-ci-ci-cd-service-account@together-internal.iam.gserviceaccount.com"
    
    - name: Invoke gcloud setup
    - uses: google-github-actions/setup-gcloud@v2

    - name: Configure Docker auth for Artifact Registry
      run: gcloud auth configure-docker australia-southeast1-docker.pkg.dev --quiet

    - name: Invoke SSH agent with ssh key
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.SSH_SECRET }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Run docker.py
      working-directory: amp
      run: python docker.py
