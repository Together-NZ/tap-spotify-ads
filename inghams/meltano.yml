version: 1
default_environment: dev
project_id: 2c71e443-d9cf-4202-aee9-a353d3d05057
environments:
- name: dev
- name: staging
- name: prod
state_backend:
  uri: gs://inghams-main-meltano-state-staging
plugins:
  extractors:
  - name: tap-dv360
    namespace: tap-dv360
    pip_url: git+https://github.com/Together-NZ/tap-dv360.git setuptools<82.0
    executable: tap-dv360
    capabilities:
    - state
    - catalog
    - discover
    - about
    - stream-maps
    config:
      start_date: ${START_DATE}
      advertiser_id: ${DV360_ADVERTISER_ID}
      query_standard: query_standard.json
      query_youtube: query_youtube.json
      service_account: together-meltano@together-internal.iam.gserviceaccount.com
  - name: tap-ttd
    namespace: tap-ttd
    pip_url: git+https://github.com/Together-NZ/tap-ttd.git setuptools<82.0
    executable: tap-ttd
    config:
      api_key: ${TAP_TTD_API_KEY}
      start_date: ${START_DATE}
      end_date: ''
      manual: false
      advertiser_id: ${TTD_ADVERTISER_ID}
  - name: tap-tiktok
    variant: gthesheep
    pip_url: git+https://github.com/gthesheep/tap-tiktok.git setuptools<82.0
    config:
      start_date: ${START_DATE}

  - name: tap-ga4
    variant: meltanolabs
    pip_url: git+https://github.com/MeltanoLabs/tap-google-analytics.git setuptools<82.0
    config:
      reports: ./report.json
      start_date: ${START_DATE}
      keep_empty_rows: true
      select:
      - goal
  - name: tap-facebook
    variant: airbyte
    pip_url: git+https://github.com/MeltanoLabs/tap-airbyte-wrapper.git setuptools<82.0
    config:
      airbyte_config:
        start_date: ${START_DATE}T00:00:00Z
    select:
    - ads_insights.*
    - ad_account.*
    - ad_sets.*
    - ads.*
    - campaigns.*
  - name: tap-hivestack
    namespace: tap-hivestack
    pip_url: git+ssh://git@github.com/Together-NZ/tap-hivestack.git setuptools<82.0
    executable: tap-hivestack
    config:
      api_key: ${TAP_HIVESTACK_API_KEY}
      report_id: ${HIVESTACK_REPORT_ID}
  loaders:
  - name: target-jsonl
    variant: andyh1203
    pip_url: target-jsonl
  - name: target-bigquery
    variant: z3z1ma
    pip_url: git+https://github.com/z3z1ma/target-bigquery.git setuptools<82.0
    config:
      dataset: ${BQ_DATASET}
      project: inghams-main
      location: australia-southeast1
      denormalized: false
      schema_resolver_version: 2
      column_name_transforms:
        add_underscore_when_invalid: true
        lower: true
        snake_case: true
      fail_fast: false
      method: ${BQ_METHOD}
      bucket: australia-southeast1-meltan-00c049c-bigquery-staging

  orchestrators:
  - name: airflow
    variant: apache
    pip_url: apache-airflow==2.10.5 --constraint 
      https://raw.githubusercontent.com/apache/airflow/constraints-2.10.5/constraints-${MELTANO__PYTHON_VERSION}.txt
  transformers:
  - name: dbt-bigquery
    variant: dbt-labs
    pip_url: dbt-core~=1.3.0 dbt-bigquery~=1.3.0 setuptools<82.0
    commands:
      cm360_waitoa_models:
        args: run --select cm360_seralized__waitoa cm360_direct_buy__waitoa
      cm360_inghams_models:
        args: run --select cm360_seralized__inghams cm360_direct_buy__inghams
      dv360_waitoa_models:
        args: run --select dv360_standard__waitoa dv360_youtube__waitoa
      dv360_inghams_models:
        args: run --select dv360_standard__inghams dv360_youtube__inghams
      facebook_waitoa_models:
        args: run --select facebook__waitoa
      facebook_inghams_models:
        args: run --select facebook__inghams
      ttd_waitoa_models:
        args: run --select ttd__waitoa
      ttd_inghams_models:
        args: run --select ttd__inghams
      hivestack_waitoa_models:
        args: run --select hivestack__waitoa
      hivestack_inghams_models:
        args: run --select hivestack__inghams
      tiktok_waitoa_models:
        args: run --select tiktok__waitoa
      ga4_waitoa_models:
        args: run --select ga4_goal_a__waitoa ga4_goal_channel__waitoa
      ga4_inghams_models:
        args: run --select ga4_goal_a__inghams ga4_goal_channel__inghams
  files:
  - name: files-airflow
    variant: meltano
    pip_url: git+https://github.com/meltano/files-airflow.git
