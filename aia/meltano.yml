version: 1
default_environment: prod
project_id: 2de0b6f6-586c-4cae-828a-f4b265302e9e
environments:
- name: dev
- name: staging
- name: prod
#state_backend:
#  uri: gs://aia-nz-main-meltano-state-staging
plugins:
  extractors:
  - name: tap-facebook

    variant: airbyte
    pip_url: git+https://github.com/MeltanoLabs/tap-airbyte-wrapper.git setuptools<82.0
    config:
      airbyte_config:
        start_date: ${START_DATE}T00:00:00Z
    select:
    - ad_account.*
    - ad_sets.*
    - ads.*
    - campaigns.*
    - custom_conversions.*
    - ads_insights
  - name: tap-linkedin-ads
    namespace: tap-linkedin-ads
    pip_url: git+https://github.com/Together-NZ/tap-linkedin.git setuptools<82.0
    executable: tap-linkedin-ads
    capabilities:
    - state
    - catalog
    - discover
    - about
    - stream-maps
    config:
      access_token: ${TAP_LINKEDIN_ADS_ACCESS_TOKEN}
      refresh_token: ${TAP_LINKEDIN_ADS_REFRESH_TOKEN}
      client_id: ${TAP_LINKEDIN_ADS_CLIENT_ID}
      client_secret: ${TAP_LINKEDIN_ADS_CLIENT_SECRET}
      accounts: '503820360'
      user_agent: agent
      start_date: ${START_DATE}
      _catalog_path: ./catalog.json
    select:
    - campaigns.*
    - creatives.*
    - ad_analytics_by_creative.*
    - ad_analytics_by_campaign.*

  - name: tap-ttd
    namespace: tap-ttd
    pip_url: git+https://github.com/Together-NZ/tap-ttd.git setuptools<82.0
    executable: tap-ttd
    config:
      api_key: ${TAP_TTD_API_KEY}
      start_date: ${START_DATE}
      end_date:
      manual: false
      advertiser_id: 0ypp1qi


  - name: tap-outbrain
    namespace: tap-outbrain
    pip_url: git+ssh://git@github.com/Together-NZ/tap-outbrain.git setuptools<82.0
    executable: tap-outbrain
    config:
      start_date: ${START_DATE}
      marketer_id: ${TAP_OUTBRAIN_MARKETER_ID}
      OB_TOKEN_V1: ${TAP_OUTBRAIN_OB_TOKEN_V1}
  - name: tap-ga4
    variant: meltanolabs
    pip_url: git+https://github.com/MeltanoLabs/tap-google-analytics.git setuptools<82.0
    config:
      reports: ./report.json
      start_date: ${START_DATE}
      keep_empty_rows: true
      select:
      - goal
  - name: tap-dv360
    namespace: tap-dv360
    pip_url: git+https://github.com/Together-NZ/tap-dv360.git setuptools<82.0
    executable: tap-dv360
    capabilities:
    - state
    - catalog
    - discover
    - about
    - stream-maps
    config:
      start_date: ${START_DATE}
      advertiser_id: '4875331'
      query_standard: query_standard.json
      query_youtube: query_youtube.json
      service_account: ${TAP_DV360_SERVICE_ACCOUNT} 

  - name: tap-tiktok
    variant: gthesheep
    pip_url: git+https://github.com/gthesheep/tap-tiktok.git setuptools<82.0
    config:
      start_date: ${START_DATE}

  loaders:
  - name: target-jsonl
    variant: andyh1203
    pip_url: target-jsonl
  - name: target-bigquery
    variant: z3z1ma
    pip_url: git+https://github.com/z3z1ma/target-bigquery.git setuptools<82.0
    config:
      dataset: ${BQ_DATASET}
      project: aia-nz-main
      location: australia-southeast1
      denormalized: false
      schema_resolver_version: 2
      column_name_transforms:
        add_underscore_when_invalid: true
        lower: true
        snake_case: true
      fail_fast: false
      bucket: australia-southeast1-meltan-00c049c-bigquery-staging
      method: storage_write_api
  transformers:
  - name: dbt-bigquery
    variant: dbt-labs
    pip_url: dbt-core~=1.3.0 dbt-bigquery~=1.3.0 setuptools<82.0
    commands:
      outbrain_models:
        args: run --select +outbrain
        description: Run the Outbrain ads model
      tiktok_models:
        args: run --select +tiktok
        description: Run the TikTok ads model
      google_ads_models:
        args: run --select +google_ads_dv 
      google_ads_brand_models:
        args: run --select +google_ads_search_brand +google_ads_demand__brand
      google_ads_marketing_models:
        args: run --select +google_ads_search_marketing +google_ads_demand__marketing
        description: Run the Google Ads model
      facebook_models:
        args: run --select +facebook
        description: Run the Facebook ads model
      dv360_models:
        args: run --select +dv360_standard +dv360_youtube
        description: Run the DV360 ads model
      ttd_models:
        args: run --select +ttd_transformed
        description: Run the TTD ads model
      cm360_models:
        args: run --select +cm360_seralized +cm360_direct_buy
        description: Run the CM360 ads model
      linkedin_models:
        args: run --select +linkedin
        description: Run the Linkedin ads model
      ga4_models:
        args: run --select +ga4_goal_a +ga4_goal_channel
        description: Run the GA4 model
elt:
  buffer_size: 52428800

