sources:

  - name: ga4_raw
    database: "{{ env_var('DBT_BIGQUERY_PROJECT', 'arvida-main') }}"
    schema: "{{ env_var('REFERENCE_GA4_RAW_BIGQUERY_DATASET', 'ga4_raw') }}"
    tables:
      - name: goal


  - name: dash_union
    database: "{{ env_var('DBT_BIGQUERY_PROJECT', 'arvida-main') }}"
    schema: "{{ env_var('REFERENCE_DASH_UNION_BIGQUERY_DATASET', 'dash_table') }}"
    tables:
      - name: dash_union

  - name: hivestack_raw
    database: "{{ env_var('DBT_BIGQUERY_PROJECT', 'arvida-main') }}"
    schema: "{{ env_var('REFERENCE_HIVESTACK_BIGQUERY_DATASET', 'hivestack_raw') }}"
    tables:
      - name: report
      - name: amp_report # for testing only

  - name: dv360_raw
    database: "{{ env_var('DBT_BIGQUERY_PROJECT', 'arvida-main') }}"
    schema: "{{ env_var('REFERENCE_DV360_BIGQUERY_DATASET', 'dv360_raw') }}"
    tables:
      - name: dv360_standard
      - name: dv360_youtube

  - name: facebook_raw
    database: "{{ env_var('DBT_BIGQUERY_PROJECT', 'arvida-main') }}"
    schema: "{{ env_var('REFERENCE_META_BIGQUERY_DATASET', 'facebook_raw') }}"
    tables:
      - name: ads_insights
      - name: ad_sets
      - name: ads
      - name: campaigns
      - name: custom_conversions


  - name: ttd_raw
    database: "{{ env_var('DBT_BIGQUERY_PROJECT', 'arvida-main') }}"
    schema: "{{ env_var('REFERENCE_TTD_TRANSFORMED_BIGQUERY_DATASET', 'ttd_raw') }}"
    tables:
      - name: standard_streams

  - name: dash_union_non_search
    database: "{{ env_var('DBT_BIGQUERY_PROJECT', 'arvida-main') }}"
    schema: "{{ env_var('REFERENCE_DASH_UNION_BIGQUERY_DATASET', 'dash_table') }}"
    tables:
      - name: dash_table
  
  - name: dash_union_search
    database: "{{ env_var('DBT_BIGQUERY_PROJECT', 'arvida-main') }}"
    schema: "{{ env_var('REFERENCE_DASH_UNION_BIGQUERY_DATASET', 'dash_table_search') }}"
    tables:
      - name: dash_table_search

models:


  - name: ttd_transformed
    config: 
      schema: "{{ env_var('TTD_SUFFIX', '') }}"
    columns:
      - name: media_cost
        tests:
          - testing_sum.expected_sum:
              expected_value: 52112.58
      - name: impressions
        tests:
          - testing_sum.expected_sum:
              expected_value: 798906
      - name: clicks
        tests:
          - testing_sum.expected_sum:
              expected_value: 363

  - name: facebook
