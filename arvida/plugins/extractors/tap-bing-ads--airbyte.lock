{
  "plugin_type": "extractors",
  "name": "tap-bing-ads",
  "namespace": "tap_airbyte",
  "variant": "airbyte",
  "label": "Bing Ads",
  "docs": "https://hub.meltano.com/extractors/tap-bing-ads--airbyte",
  "repo": "https://github.com/airbytehq/airbyte/tree/master/airbyte-integrations/connectors/source-bing-ads",
  "pip_url": "git+https://github.com/MeltanoLabs/tap-airbyte-wrapper.git",
  "executable": "tap-airbyte",
  "description": "Advertising Platform",
  "logo_url": "https://hub.meltano.com/assets/logos/extractors/bing-ads.png",
  "capabilities": [
    "about",
    "catalog",
    "discover",
    "schema-flattening",
    "state",
    "stream-maps"
  ],
  "settings_group_validation": [
    [
      "airbyte_config.client_id",
      "airbyte_config.developer_token",
      "airbyte_config.refresh_token",
      "airbyte_config.reports_start_date",
      "airbyte_spec.image"
    ]
  ],
  "settings": [
    {
      "name": "airbyte_config.auth_method",
      "kind": "string",
      "label": "Airbyte Config Auth Method"
    },
    {
      "name": "airbyte_config.client_id",
      "kind": "string",
      "label": "Airbyte Config Client Id",
      "description": "The Client ID of your Microsoft Advertising developer application.",
      "sensitive": true
    },
    {
      "name": "airbyte_config.client_secret",
      "kind": "string",
      "label": "Airbyte Config Client Secret",
      "description": "The Client Secret of your Microsoft Advertising developer application.",
      "sensitive": true
    },
    {
      "name": "airbyte_config.developer_token",
      "kind": "string",
      "label": "Airbyte Config Developer Token",
      "description": "Developer token associated with user. See more info <a href=\"https://docs.microsoft.com/en-us/advertising/guides/get-started?view=bingads-13#get-developer-token\"> in the docs</a>.",
      "sensitive": true
    },
    {
      "name": "airbyte_config.refresh_token",
      "kind": "string",
      "label": "Airbyte Config Refresh Token",
      "description": "Refresh Token to renew the expired Access Token.",
      "sensitive": true
    },
    {
      "name": "airbyte_config.reports_start_date",
      "kind": "string",
      "label": "Airbyte Config Reports Start Date",
      "description": "The start date from which to begin replicating report data. Any data generated before this date will not be replicated in reports. This is a UTC date in YYYY-MM-DD format."
    },
    {
      "name": "airbyte_config.tenant_id",
      "kind": "string",
      "label": "Airbyte Config Tenant Id",
      "description": "The Tenant ID of your Microsoft Advertising developer application. Set this to \"common\" unless you know you need a different value.",
      "sensitive": true
    },
    {
      "name": "airbyte_spec.image",
      "kind": "string",
      "value": "airbyte/source-bing-ads",
      "label": "Airbyte Spec Image",
      "description": "Airbyte image to run"
    },
    {
      "name": "airbyte_spec.tag",
      "kind": "string",
      "value": "latest",
      "label": "Airbyte Spec Tag",
      "description": "Airbyte image tag"
    },
    {
      "name": "docker_mounts",
      "kind": "array",
      "label": "Docker Mounts",
      "description": "Docker mounts to make available to the Airbyte container. Expects a list of maps containing source, target, and type as is documented in the docker --mount documentation"
    },
    {
      "name": "flattening_enabled",
      "kind": "boolean",
      "label": "Flattening Enabled",
      "description": "'True' to enable schema flattening and automatically expand nested properties."
    },
    {
      "name": "flattening_max_depth",
      "kind": "integer",
      "label": "Flattening Max Depth",
      "description": "The max depth to flatten schemas."
    },
    {
      "name": "stream_map_config",
      "kind": "object",
      "label": "Stream Map Config",
      "description": "User-defined config values to be used within map expressions."
    },
    {
      "name": "stream_maps",
      "kind": "object",
      "label": "Stream Maps",
      "description": "Config object for stream maps capability. For more information check out [Stream Maps](https://sdk.meltano.com/en/latest/stream_maps.html)."
    }
  ]
}
