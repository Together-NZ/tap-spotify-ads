version: 1
default_environment: prod
project_id: 2de0b6f6-586c-4cae-828a-f4b265302e9e
environments:
- name: dev
- name: staging
- name: prod
#state_backend:
#  uri: gs://arvida-main-meltano-state-staging
plugins:
  extractors:
  - name: tap-facebook
    variant: airbyte
    pip_url: git+https://github.com/MeltanoLabs/tap-airbyte-wrapper.git setuptools<82.0
    config:
      airbyte_config:
        start_date: ${START_DATE}T00:00:00Z
    select:
    - ads_insights.*
    - ad_account.*
    - ad_sets.*
    - ads.*
    - campaigns.*
  - name: tap-ttd
    namespace: tap-ttd
    pip_url: git+https://github.com/Together-NZ/tap-ttd.git setuptools<82.0
    executable: tap-ttd
    config:
      api_key: ${TAP_TTD_API_KEY}
      start_date: ${START_DATE}
      end_date: 
      manual: false
      advertiser_id: x21b2nk
  - name: tap-ga4
    variant: meltanolabs
    pip_url: git+https://github.com/MeltanoLabs/tap-google-analytics.git setuptools<82.0
    config:
      reports: ./report.json
      start_date: ${START_DATE}
      keep_empty_rows: true
      select:
      - goal
  - name: tap-dv360
    namespace: tap-dv360
    pip_url: git+https://github.com/Together-NZ/tap-dv360.git setuptools<82.0
    executable: tap-dv360
    capabilities:
    - state
    - catalog
    - discover
    - about
    - stream-maps
    config:
      start_date: ${START_DATE}
      advertiser_id: '680385018'
      query_standard: query_standard.json
      query_youtube: query_youtube.json
      service_account: together-meltano@together-internal.iam.gserviceaccount.com
  - name: tap-hivestack
    namespace: tap-hivestack
    pip_url: git+ssh://git@github.com/Together-NZ/tap-hivestack.git setuptools<82.0
    executable: tap-hivestack
    config:
        api_key: ${TAP_HIVESTACK_API_KEY}
        report_id: '66526'
  utilities:
  - name: run_python
    namespace: run-python
    executable: python
    commands:
      convert: fetch_neilson.py

  loaders:
  - name: target-jsonl
    variant: andyh1203
    pip_url: target-jsonl
  - name: target-bigquery
    variant: z3z1ma
    pip_url: git+https://github.com/z3z1ma/target-bigquery.git setuptools<82.0
    config:
      dataset: ${BQ_DATASET}
      project: arvida-main
      location: australia-southeast1
      denormalized: false
      schema_resolver_version: 2
      column_name_transforms:
        add_underscore_when_invalid: true
        lower: true
        snake_case: true
      fail_fast: false
      method: ${BQ_METHOD}
      bucket: australia-southeast1-meltan-00c049c-bigquery-staging
  transformers:
  - name: dbt-bigquery
    variant: dbt-labs
    pip_url: dbt-core~=1.9.2 dbt-bigquery~=1.9.1 setuptools<82.0
    commands:
      ga4_models:
        args: run --select +ga4_goal_a +ga4_goal_channel
        description: Run the Google Analytics models
      google_ads_display_video_models:
        args: run --select +google_ads_display_videos
        description: Run the Google Ads model
      facebook_models:
        args: run --select +facebook
        description: Run the Facebook ads model
      dv360_models:
        args: run --select +dv360_standard +dv360_youtube
        description: Run the DV360 ads model
      ttd_models:
        args: run --select +ttd_transformed
        description: Run the TTD ads model
      cm360_models:
        args: run --select +cm360_seralized +cm360_direct_buy
        description: Run the CM360 ads model
      hivestack_models:
        args: run --select +hivestack
        description: Run the HiveStack model
      neilson_models:
        args: run --select +neilson_latest_track
        description: Run the Neilson model
elt:
  buffer_size: 52428800
