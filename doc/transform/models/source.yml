sources:

  - name: ga4_raw
    database: "{{ env_var('DBT_BIGQUERY_PROJECT', 'doconservation-main') }}"
    schema: "{{ env_var('REFERENCE_GA4_RAW_BIGQUERY_DATASET', 'ga4_raw') }}"
    tables:
      - name: goal

  - name: dash_union
    database: "{{ env_var('DBT_BIGQUERY_PROJECT', 'doconservation-main') }}"
    schema: "{{ env_var('REFERENCE_DASH_UNION_BIGQUERY_DATASET', 'dash_table') }}"
    tables:
      - name: dash_union
      - name: dash_table

  - name: dash_union_search
    database: "{{ env_var('DBT_BIGQUERY_PROJECT', 'doconservation-main') }}"
    schema: "{{ env_var('REFERENCE_DASH_UNION_SEARCH_BIGQUERY_DATASET', 'dash_table_search') }}"
    tables:
      - name: dash_table_search

  - name: dv360_raw
    database: "{{ env_var('DBT_BIGQUERY_PROJECT', 'doconservation-main') }}"
    schema: "{{ env_var('REFERENCE_DV360_BIGQUERY_DATASET', 'dv360_raw') }}"
    tables:
      - name: dv360_standard
      - name: dv360_youtube

  - name: dv360_transformed
    database: "{{ env_var('DBT_BIGQUERY_PROJECT', 'doconservation-main') }}"
    schema: "{{ env_var('REFERENCE_DV360_TRANSFORMED_BIGQUERY_DATASET', 'dv360_transformed') }}"
    tables:
      - name: dv360_standard
      - name: dv360_youtube

  - name: facebook_raw
    database: "{{ env_var('DBT_BIGQUERY_PROJECT', 'doconservation-main') }}"
    schema: "{{ env_var('REFERENCE_META_BIGQUERY_DATASET', 'facebook_raw') }}"
    tables:
      - name: ads_insights
      - name: ad_sets
      - name: ads
      - name: campaigns
      - name: custom_conversions

  - name: facebook_transformed
    database: "{{ env_var('DBT_BIGQUERY_PROJECT', 'doconservation-main') }}"
    schema: "{{ env_var('REFERENCE_META_TRANSFORMED_BIGQUERY_DATASET', 'facebook_transformed') }}"
    tables:
      - name: facebook

  - name: linkedin_raw
    database: "{{ env_var('DBT_BIGQUERY_PROJECT', 'doconservation-main') }}"
    schema: "{{ env_var('REFERENCE_LINKEDIN_BIGQUERY_DATASET', 'linkedin_raw') }}"
    tables:
      - name: campaigns
      - name: creatives
      - name: campaign_groups
      - name: ad_analytics_by_creative

  - name: linkedin_transformed
    database: "{{ env_var('DBT_BIGQUERY_PROJECT', 'doconservation-main') }}"
    schema: "{{ env_var('REFERENCE_LINKEDIN_TRANSFORMED_BIGQUERY_DATASET', 'linkedin_transformed') }}"
    tables:
      - name: linkedin

  - name: tiktok_raw
    database: "{{ env_var('DBT_BIGQUERY_PROJECT', 'doconservation-main') }}"
    schema: "{{ env_var('REFERENCE_TIKTOK_BIGQUERY_DATASET', 'tiktok_raw') }}"
    tables:
      - name: ads
      - name: ads_basic_data_metrics_by_day
      - name: ads_video_play_metrics_by_day

  - name: tiktok_transformed
    database: "{{ env_var('DBT_BIGQUERY_PROJECT', 'doconservation-main') }}"
    schema: "{{ env_var('REFERENCE_TIKTOK_TRANSFORMED_BIGQUERY_DATASET', 'tiktok_transformed') }}"
    tables:
      - name: tiktok

  - name: google_ads
    database: "{{ env_var('DBT_BIGQUERY_PROJECT', 'doconservation-main') }}"
    schema: "{{ env_var('REFERENCE_GOOGLE_ADS_SEARCH_TRANSFORMED_BIGQUERY_DATASET', 'google_ads_search_transformed') }}"
    tables:
      - name: google_ads_demand
      - name: google_ads_search
models:

  - name: facebook
    config:
      schema: "{{ env_var('META_SUFFIX', '') }}"

    columns:
      - name: media_cost
        tests:
          - testing_sum.expected_sum:
              expected_value: 14549.95
      - name: impressions
        tests:
          - testing_sum.expected_sum:
              expected_value: 2857616
      - name: clicks
        tests:
          - testing_sum.expected_sum:
              expected_value: 22450
      

  - name: dv360_standard
    config:
      schema: "{{ env_var('DV360_SUFFIX', '') }}"
    columns:
      - name: media_cost
        tests:
          - testing_sum.expected_sum:
              expected_value: 68223.08
      - name: impressions
        tests:
          - testing_sum.expected_sum:
              expected_value: 5840202
      - name: clicks
        tests:
          - testing_sum.expected_sum:
              expected_value: 7786
  - name: dv360_youtube
    config:
      schema: "{{ env_var('DV360_SUFFIX', '') }}"
    columns:
      - name: media_cost
        tests:
          - testing_sum.expected_sum:
              expected_value: 67127.98
      - name: impressions
        tests:
          - testing_sum.expected_sum:
              expected_value: 5248537
      - name: clicks
        tests:
          - testing_sum.expected_sum:
              expected_value: 4432

  - name: linkedin
    config:
      schema: "{{ env_var('LINKEDIN_SUFFIX','') }}"
    columns:
      - name: media_cost
        tests:
          - testing_sum.expected_sum:
              expected_value: 8327.91
      - name: impressions
        tests:
          - testing_sum.expected_sum:
              expected_value: 771281
      - name: clicks
        tests:
          - testing_sum.expected_sum:
              expected_value: 5785


