version: 1
default_environment: dev
project_id: 4f5340fe-b63b-41b8-8b8a-963749a65dc3
environments:
- name: dev
- name: staging
- name: prod
#state_backend:
#  uri: gs://doconservation-meltano-state-staging
plugins:
  extractors:
  - name: tap-linkedin-ads
    namespace: tap-linkedin-ads
    pip_url: git+https://github.com/Together-NZ/tap-linkedin.git setuptools<82.0
    executable: tap-linkedin-ads
    capabilities:
    - state
    - catalog
    - discover
    - about
    - stream-maps
    config:
      access_token: ${TAP_LINKEDIN_ADS_ACCESS_TOKEN}
      refresh_token: ${TAP_LINKEDIN_ADS_REFRESH_TOKEN}
      client_id: ${TAP_LINKEDIN_ADS_CLIENT_ID}
      client_secret: ${TAP_LINKEDIN_ADS_CLIENT_SECRET}
      accounts: '516749395'
      user_agent: agent
      start_date: ${START_DATE}
      _catalog_path: ./catalog.json
    select:
    - campaigns.*
    - creatives.*
    - ad_analytics_by_creative.*
    - campaign_groups.*

  - name: tap-ga4
    variant: meltanolabs
    pip_url: git+https://github.com/MeltanoLabs/tap-google-analytics.git setuptools<82.0
    config:
      reports: ./report.json
      start_date: ${START_DATE}
      keep_empty_rows: true
      select:
      - goal

  - name: tap-dv360
    namespace: tap-dv360
    pip_url: git+https://github.com/Together-NZ/tap-dv360.git setuptools<82.0
    executable: tap-dv360
    capabilities:
    - state
    - catalog
    - discover
    - about
    - stream-maps
    config:
      start_date: ${START_DATE}
      advertiser_id: '7579219911'
      query_standard: query_standard.json
      query_youtube: query_youtube.json
      service_account: 
        together-meltano@together-internal.iam.gserviceaccount.com
  - name: tap-facebook
    variant: airbyte
    pip_url: git+https://github.com/MeltanoLabs/tap-airbyte-wrapper.git setuptools<82.0
    config:
      airbyte_config:
        start_date: ${START_DATE}T00:00:00Z
    select:
    - ads_insights
    - ad_account.*
    - ad_sets.*
    - ads.*
    - campaigns.*



  - name: tap-tiktok
    variant: gthesheep
    pip_url: git+https://github.com/gthesheep/tap-tiktok.git setuptools<82.0
    config:
      start_date: ${START_DATE}
  loaders:
  - name: target-jsonl
    variant: andyh1203
    pip_url: target-jsonl
  - name: target-bigquery
    variant: z3z1ma
    pip_url: git+https://github.com/z3z1ma/target-bigquery.git setuptools<82.0
    config:
      dataset: ${BQ_DATASET}
      project: doconservation-main
      location: australia-southeast1
      denormalized: false
      schema_resolver_version: 2
      column_name_transforms:
        add_underscore_when_invalid: true
        lower: true
        snake_case: true
      fail_fast: false
      bucket: australia-southeast1-meltan-00c049c-bigquery-staging
      method: storage_write_api
  orchestrators:
  - name: airflow
    variant: apache
    pip_url: apache-airflow==2.10.5 --constraint 
      https://raw.githubusercontent.com/apache/airflow/constraints-2.10.5/constraints-${MELTANO__PYTHON_VERSION}.txt
  transformers:
  - name: dbt-bigquery
    variant: dbt-labs
    pip_url: dbt-core~=1.9.2 dbt-bigquery~=1.9.1 setuptools<82.0
    commands:
      facebook_models: run --select +facebook
      dv360_models: run --select +dv360_standard +dv360_youtube
      tiktok_models: run --select +tiktok
      ga4_models: run --select +ga4_goal_a +ga4_goal_channel
      google_ads_models: run --select +google_ads_search +google_ads_demand
      linkedin_models:
        args: run --select +linkedin
    config:
      project: doconservation-main
      location: australia-southeast1
      method: oauth
  files:
  - name: files-airflow
    variant: meltano
    pip_url: git+https://github.com/meltano/files-airflow.git
