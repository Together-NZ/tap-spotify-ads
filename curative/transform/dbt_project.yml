name: curative
version: '1.0'
profile: meltano
config-version: 2
require-dbt-version: [">=1.0.0", "<2.0.0"]
model-paths:
- models
analysis-paths:
- analysis
test-paths:
- tests
seed-paths:
- data
macro-paths:
- macros
snapshot-paths:
- snapshots
target-path: ../.meltano/transformers/dbt/target
log-path: logs
packages-install-path: dbt_packages
clean-targets:
- ../.meltano/transformers/dbt/target
- dbt_packages
- logs
models:
  curative:
    +materialized: table

    cm360_creativenz:
     

    ttd_creativenz:
 

    cm360_fasd:
      +schema: cm360_fasd_transformed

    ttd_fasd:
      +schema: ttd_fasd_transformed

    cm360_protectyourbreath:
      +schema: cm360_protectyourbreath_transformed

    ttd_protectyourbreath:
      +schema: ttd_protectyourbreath_transformed