sources:

  - name: ga4_raw
    database: "{{ env_var('DBT_BIGQUERY_PROJECT', 'colorsteel-main') }}"
    schema: "{{ env_var('REFERENCE_GA4_RAW_BIGQUERY_DATASET', 'ga4_raw') }}"
    tables:
      - name: goal

  - name: facebook_raw
    database: "{{ env_var('DBT_BIGQUERY_PROJECT', 'colorsteel-main') }}"
    schema: "{{ env_var('REFERENCE_META_BIGQUERY_DATASET', 'facebook_raw') }}"
    tables:
      - name: ads_insights
      - name: ad_sets
      - name: ads
      - name: campaigns
      - name: custom_conversions

  - name: dv360_raw
    database: "{{ env_var('DBT_BIGQUERY_PROJECT', 'colorsteel-main') }}"
    schema: "{{ env_var('REFERENCE_DV360_BIGQUERY_DATASET', 'dv360_raw') }}"
    tables:
      - name: dv360_standard
      - name: dv360_youtube

  - name: ttd_raw
    database: "{{ env_var('DBT_BIGQUERY_PROJECT', 'colorsteel-main') }}"
    schema: "{{ env_var('REFERENCE_TTD_TRANSFORMED_BIGQUERY_DATASET', 'ttd_raw') }}"
    tables:
      - name: standard_streams

  - name: pinterest_raw
    database: "{{ env_var('DBT_BIGQUERY_PROJECT', 'colorsteel-main') }}"
    schema: "{{ env_var('REFERENCE_PINTEREST_BIGQUERY_DATASET', 'pinterest_raw') }}"
    tables:
      - name: reports
      - name: ads
      - name: ad_groups
      - name: campaigns

  - name: dash_union
    database: "{{ env_var('DBT_BIGQUERY_PROJECT', 'colorsteel-main') }}"
    schema: "{{ env_var('REFERENCE_DASH_UNION_BIGQUERY_DATASET', 'dash_table') }}"
    tables:
      - name: dash_table
      - name: dash_union

models:

  - name: ttd_transformed
    config: 
      schema: "{{ env_var('TTD_SUFFIX', '') }}"
    columns:
      - name: media_cost
        tests:
          - testing_sum.expected_sum:
              expected_value: 52112.58
      - name: impressions
        tests:
          - testing_sum.expected_sum:
              expected_value: 798906
      - name: clicks
        tests:
          - testing_sum.expected_sum:
              expected_value: 363

  - name: facebook
    config:
      schema: "{{ env_var('META_SUFFIX', '') }}"

    columns:
      - name: media_cost
        tests:
          - testing_sum.expected_sum:
              expected_value: 14549.95
      - name: impressions
        tests:
          - testing_sum.expected_sum:
              expected_value: 2857616
      - name: clicks
        tests:
          - testing_sum.expected_sum:
              expected_value: 22450
      

  - name: dv360_standard
    config:
      schema: "{{ env_var('DV360_SUFFIX', '') }}"
    columns:
      - name: media_cost
        tests:
          - testing_sum.expected_sum:
              expected_value: 68223.08
      - name: impressions
        tests:
          - testing_sum.expected_sum:
              expected_value: 5840202
      - name: clicks
        tests:
          - testing_sum.expected_sum:
              expected_value: 7786
  - name: dv360_youtube
    config:
      schema: "{{ env_var('DV360_SUFFIX', '') }}"
    columns:
      - name: media_cost
        tests:
          - testing_sum.expected_sum:
              expected_value: 67127.98
      - name: impressions
        tests:
          - testing_sum.expected_sum:
              expected_value: 5248537
      - name: clicks
        tests:
          - testing_sum.expected_sum:
              expected_value: 4432