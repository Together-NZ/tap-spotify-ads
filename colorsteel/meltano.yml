version: 1
default_environment: prod
project_id: 2de0b6f6-586c-4cae-828a-f4b265302e9e
environments:
- name: dev
- name: staging
- name: prod
# state_backend:
#  uri: gs://colorsteel-main-meltano-state-staging
plugins:
  extractors:
  - name: tap-ga4
    variant: meltanolabs
    pip_url: git+https://github.com/MeltanoLabs/tap-google-analytics.git setuptools<82.0
    config:
      reports: ./report.json
      start_date: ${START_DATE}
      keep_empty_rows: true
      select:
      - goal
  - name: tap-facebook
    variant: airbyte
    pip_url: git+https://github.com/MeltanoLabs/tap-airbyte-wrapper.git setuptools<82.0
    config:
        airbyte_config:
          start_date: ${START_DATE}T00:00:00Z
    select:
        - ads_insights.*
        - ad_account.*
        - ad_sets.*
        - ads.*
        - campaigns.*
        - custom_conversions.*
  - name: tap-ttd
    namespace: tap-ttd
    pip_url: git+https://github.com/Together-NZ/tap-ttd.git setuptools<82.0
    executable: tap-ttd
    config:
      api_key: ${TAP_TTD_API_KEY}
      start_date: ${START_DATE}
      end_date:
      manual: false
      advertiser_id: utfcnv7
  - name: tap-dv360
    namespace: tap-dv360
    pip_url: git+https://github.com/Together-NZ/tap-dv360.git setuptools<82.0
    executable: tap-dv360
    capabilities:
    - state
    - catalog
    - discover
    - about
    - stream-maps
    config:
      start_date: ${START_DATE}
      advertiser_id: '1168581503'
      query_standard: dv360_standard.json
      query_youtube: dv360_youtube.json
      service_account: together-meltano@together-internal.iam.gserviceaccount.com
  - name: tap-pinterest-ads
    namespace: tap-pinterest-ads
    pip_url: git+ssh://git@github.com/Together-NZ/tap-pinterest-ads.git setuptools<82.0
    config:
      client_id: ${PINTEREST_CLIENT_ID}
      client_secret: ${PINTEREST_CLIENT_SECRET}
      refresh_token: ${PINTEREST_REFRESH_TOKEN}
      ad_account_id: ${AD_ACCOUNT_ID}
      start_date: ${START_DATE}
      end_date: ${END_DATE}
  loaders:
  - name: target-jsonl
    variant: andyh1203
    pip_url: target-jsonl
  - name: target-bigquery
    variant: z3z1ma
    pip_url: git+https://github.com/z3z1ma/target-bigquery.git setuptools<82.0
    config:
      dataset: ${BQ_DATASET}
      project: colorsteel-main
      location: australia-southeast1
      denormalized: false
      schema_resolver_version: 2
      column_name_transforms:
        add_underscore_when_invalid: true
        lower: true
        snake_case: true
      fail_fast: false
      method: ${BQ_METHOD}
      bucket: australia-southeast1-meltan-00c049c-bigquery-staging
  transformers:
  - name: dbt-bigquery
    variant: dbt-labs
    pip_url: dbt-core~=1.9.2 dbt-bigquery~=1.9.1 setuptools<82.0
    config:
      project: colorsteel-main
      location: australia-southeast1
      method: oauth
    commands:
      pinterest_models:
        args: run --select +pinterest
        description: Run the Pinterest ads model
      ga4_models:
        args: run --select +ga4_goal_a +ga4_goal_channel
        description: Run the Google Analytics models
      ttd_models:
        args: run --select +ttd_transformed
        description: Run the TTD ads model
      facebook_models:
        args: run --select +facebook
        description: Run the Facebook ads model
      cm360_models:
        args: run --select +cm360_direct_buy +cm360_seralized
        description: Run the CM360 ads model
      dv360_models:
        args: run --select +dv360_standard +dv360_youtube
        description: Run the DV360 ads model

elt:
  buffer_size: 52428800

