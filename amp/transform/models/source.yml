sources:
# This part seperates the project and table between staging environment and 
#production environment. How it works is this: A source has its name you decleared,
# and it takes in three variabels: database(gcp project), shcema(bigquerydatasets) and tables(bigquery tables), database points to the project
# shcema points to the datasets, and tables is the tables. 
# Eg:
# - name: source_name
#   database: "{{ env_var('DBT_BIGQUERY_PROJECT', 'amp-main') }}"
#   schema: "{{ env_var('REFERENCE_META_BIGQUERY_DATASET', 'facebook_raw') }}"
#   tables:
#     - name: ads_insights
#     - name: ad_sets
#     - name: ads
#     - name: campaigns
#     - name: custom_conversions
# Then in the relevant dbt model, you will see {{ source('source_name', 'table_name_you_picked') }}
# where project name and dataset name are decleared in source.yml per project
# 
  - name: facebook_raw

    database: "{{ env_var('DBT_BIGQUERY_PROJECT', 'amp-main') }}"
    schema: "{{ env_var('REFERENCE_META_BIGQUERY_DATASET', 'facebook_raw') }}"
    tables:
      - name: ads_insights
      - name: ad_sets
      - name: ads
      - name: campaigns
      - name: custom_conversions

  - name: dv360_raw
    database: "{{ env_var('DBT_BIGQUERY_PROJECT', 'amp-main') }}"
    schema: "{{ env_var('REFERENCE_DV360_BIGQUERY_DATASET', 'dv360_raw') }}"
    tables:
      - name: dv360_standard
      - name: dv360_youtube
  - name: hivestack_raw
    database: "{{ env_var('DBT_BIGQUERY_PROJECT', 'amp-main') }}"
    schema: "{{ env_var('REFERENCE_HIVESTACK_BIGQUERY_DATASET', 'hivestack_raw') }}"
    tables:
      - name: amp_report


  - name: linkedin_raw
    database: "{{ env_var('DBT_BIGQUERY_PROJECT', 'amp-main') }}"
    schema: "{{ env_var('REFERENCE_LINKEDIN_BIGQUERY_DATASET', 'linkedin_raw') }}"
    tables:
      - name: ad_analytics_by_creative
      - name: ad_analytics_by_campaign
      - name: creatives
      - name: campaigns
      - name: campaign_groups

  - name: ttd_raw
    database: "{{ env_var('DBT_BIGQUERY_PROJECT', 'amp-main') }}"
    schema: "{{ env_var('REFERENCE_TTD_TRANSFORMED_BIGQUERY_DATASET', 'ttd_raw') }}"
    tables:
      - name: standard_streams

  

  