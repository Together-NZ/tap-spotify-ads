version: 1
default_environment: prod
project_id: 2de0b6f6-586c-4cae-828a-f4b265302e9e
environments:
- name: dev
- name: staging
  config:
    plugins:
      transformers:
      - name: dbt-bigquery
        env:
          DBT_BIGQUERY_PROJECT: together-internal
          DBT_BIGQUERY_LOCATION: australia-southeast1
          REFERENCE_META_BIGQUERY_DATASET: dbt_test_facebook
          REFERENCE_DV360_BIGQUERY_DATASET: dbt_test_dv360
          REFERENCE_LINKEDIN_BIGQUERY_DATASET: dbt_test_linkedin
          REFERENCE_TTD_TRANSFORMED_BIGQUERY_DATASET: dbt_test_ttd  
          REFERENCE_REDDIT_BIGQUERY_DATASET: dbt_test_reddit
          REFERENCE_TIKTOK_BIGQUERY_DATASET: dbt_test_tiktok
          REFERENCE_SNAPCHAT_BIGQUERY_DATASET: dbt_test_snapchat
          META_SUFFIX: dbt_test_facebook
          DV360_SUFFIX: dbt_test_dv360
          GOOGLE_ADS_SEARCH_SUFFIX: dbt_test_google_ads_search
          LINKEDIN_SUFFIX: dbt_test_linkedin
          TTD_SUFFIX: dbt_test_ttd
          REDDIT_SUFFIX: dbt_test_reddit
          HIVESTACK_SUFFIX: dbt_test_hivestack
          TIKTOK_SUFFIX: dbt_test_tiktok
          SNAPCHAT_SUFFIX: dbt_test_snapchat
- name: prod
#state_backend:
#  uri: gs://moe-main-meltano-state-staging
plugins:
  extractors:
  - name: tap-reddit-ads
    namespace: tap-reddit-ads
    pip_url: git+ssh://git@github.com/Together-NZ/tap-reddit-ads.git setuptools<82.0
    executable: tap-reddit-ads
    config:
      refresh_token: ${TAP_REDDIT_ADS_REFRESH_TOKEN}
      ad_account_id: ${TAP_REDDIT_ADS_AD_ACCOUNT_ID}
      app_id: ${TAP_REDDIT_ADS_APP_ID}
      client_secret: ${TAP_REDDIT_ADS_CLIENT_SECRET}
      start_date: ${START_DATE}
      
  - name: tap-linkedin-ads
    namespace: tap-linkedin-ads
    pip_url: git+https://github.com/Together-NZ/tap-linkedin.git setuptools<82.0
    executable: tap-linkedin-ads
    capabilities:
    - state
    - catalog
    - discover
    - about
    - stream-maps
    config:
      access_token: ${TAP_LINKEDIN_ADS_ACCESS_TOKEN}
      refresh_token: ${TAP_LINKEDIN_ADS_REFRESH_TOKEN}
      client_id: ${TAP_LINKEDIN_ADS_CLIENT_ID}
      client_secret: ${TAP_LINKEDIN_ADS_CLIENT_SECRET}
      accounts: '513526327'
      user_agent: agent
      start_date: ${START_DATE}
      _catalog_path: ./catalog.json
    select:
    - campaign_groups.*
    - campaigns.*
    - creatives.*
    - ad_analytics_by_creative.*
  - name: tap-hivestack
    namespace: tap-hivestack
    pip_url: git+ssh://git@github.com/Together-NZ/tap-hivestack.git setuptools<82.0
    executable: tap-hivestack
    config:
        api_key: ${TAP_HIVESTACK_API_KEY}
        report_id: '90252' 
  - name: tap-tiktok
    variant: gthesheep
    pip_url: git+https://github.com/gthesheep/tap-tiktok.git setuptools<82.0
    config:
      start_date: ${START_DATE}
  - name: tap-dv360
    namespace: tap-dv360
    pip_url: git+https://github.com/Together-NZ/tap-dv360.git setuptools<82.0
    executable: tap-dv360
    capabilities:
    - state
    - catalog
    - discover
    - about
    - stream-maps
    config:
      start_date: ${START_DATE}
      advertiser_id: '6843179935'
      query_standard: dv360_standard.json
      query_youtube: dv360_youtube.json
      service_account: together-meltano@together-internal.iam.gserviceaccount.com
  - name: tap-ttd
    namespace: tap-ttd
    pip_url: git+https://github.com/Together-NZ/tap-ttd.git setuptools<82.0
    executable: tap-ttd
    config:
      api_key: ${TAP_TTD_API_KEY}
      start_date: ${START_DATE}
      end_date:
      manual: false
      advertiser_id: 6qlragg
  - name: tap-ga4
    variant: meltanolabs
    pip_url: git+https://github.com/MeltanoLabs/tap-google-analytics.git setuptools<82.0
    config:
      reports: ./report.json
      start_date: ${START_DATE}
      keep_empty_rows: true
      select:
      - goal
  - name: tap-facebook
    variant: airbyte
    pip_url: git+https://github.com/MeltanoLabs/tap-airbyte-wrapper.git setuptools<82.0
    config:
      airbyte_config:
        start_date: ${START_DATE}T00:00:00Z
    select:
    - ads_insights.*
    - ad_account.*
    - ad_sets.*
    - ads.*
    - campaigns.*
    - custom_conversions.*

  - name: tap-reddit-ads
    namespace: tap-reddit-ads
    pip_url: git+ssh://git@github.com/Together-NZ/tap-reddit-ads.git setuptools<82.0
    executable: tap-reddit-ads
    config:
      refresh_token: ${TAP_REDDIT_ADS_REFRESH_TOKEN}
      ad_account_id: ${TAP_REDDIT_ADS_AD_ACCOUNT_ID}
      app_id: ${TAP_REDDIT_ADS_APP_ID}
      client_secret: ${TAP_REDDIT_ADS_CLIENT_SECRET}
      start_date: ${START_DATE}
  - name: tap-tiktok
    variant: gthesheep
    pip_url: git+https://github.com/gthesheep/tap-tiktok.git setuptools<82.0
    config:
      start_date: ${START_DATE}
  - name: tap-snapchat-ads
    namespace: tap-snapchat-ads
    pip_url: git+https://github.com/Together-NZ/tap_snapchat_ads.git setuptools<82.0
    executable: tap-snapchat-ads
    capabilities:
    - catalog
    config:
      client_id: ${TAP_SNAPCHAT_ADS_CLIENT_ID}
      client_secret: ${TAP_SNAPCHAT_ADS_CLIENT_SECRET}
      refresh_token: ${TAP_SNAPCHAT_ADS_REFRESH_TOKEN}
      start_date: ${START_DATE}T00:00:00Z
      user_agent: Meltano
      org_account_ids: ${TAP_SNAPCHAT_ADS_ORG_ACCOUNT_IDS}
      ad_account_ids: ${TAP_SNAPCHAT_ADS_AD_ACCOUNT_IDS}
    catalog: snapchat_catalog.json
  loaders:
  - name: target-jsonl
    variant: andyh1203
    pip_url: target-jsonl
  - name: target-bigquery
    variant: z3z1ma
    pip_url: git+https://github.com/z3z1ma/target-bigquery.git setuptools<82.0
    config:
      dataset: ${BQ_DATASET}
      project: moe-main
      location: australia-southeast1
      denormalized: false
      schema_resolver_version: 2
      column_name_transforms:
        add_underscore_when_invalid: true
        lower: true
        snake_case: true
      fail_fast: false
      method: ${BQ_METHOD}
      bucket: australia-southeast1-meltan-00c049c-bigquery-staging
  orchestrators:
  - name: airflow
    variant: apache
    pip_url: apache-airflow==2.10.5 --constraint 
      https://raw.githubusercontent.com/apache/airflow/constraints-2.10.5/constraints-${MELTANO__PYTHON_VERSION}.txt
  transformers:
  - name: dbt-bigquery
    variant: dbt-labs
    pip_url: dbt-core~=1.8.0 dbt-bigquery~=1.8.0 setuptools<82.0
    commands:
      cm360_models:
        args: run --select +cm360_seralized +cm360_direct_buy
      dv360_models:
        args: run --select +dv360_standard +dv360_youtube
      facebook_models:
        args: run --select +facebook
      snapchat_models:
        args: run --select +snapchat
      linkedin_models:
        args: run --select +linkedin
      tiktok_models:
        args: run --select +tiktok
      ttd_models:
        args: run --select +ttd_transformed
      ga4_career_models:
        args: run --select ga4_goal_a__career ga4_goal_channel__career
      ga4_education_models:
        args: run --select ga4_goal_a__education ga4_goal_channel__education
      hivestack_models:
        args: run --select +hivestack
      reddit_models:
        args: run --select +reddit
      google_ads_models:
        args: run --select +google_ads_search

  files:
  - name: files-airflow
    variant: meltano
    pip_url: git+https://github.com/meltano/files-airflow.git
elt:
  buffer_size: 52428800

