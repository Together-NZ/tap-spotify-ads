version: 2

# Squirrel BigQuery layout. Defaults match `squirrel-together-main.*`.
# Override with DBT_BIGQUERY_PROJECT and REFERENCE_* env vars per environment.

sources:

  - name: ga4_raw
    database: "{{ env_var('DBT_BIGQUERY_PROJECT', 'squirrel-together-main') }}"
    schema: "{{ env_var('REFERENCE_GA4_RAW_BIGQUERY_DATASET', 'ga4_raw') }}"
    tables:
      - name: goal

  - name: dash_union
    database: "{{ env_var('DBT_BIGQUERY_PROJECT', 'squirrel-together-main') }}"
    schema: "{{ env_var('REFERENCE_DASH_UNION_BIGQUERY_DATASET', 'dash_table') }}"
    tables:
      - name: dash_union
      - name: dash_table

  - name: dv360_raw
    database: "{{ env_var('DBT_BIGQUERY_PROJECT', 'squirrel-together-main') }}"
    schema: "{{ env_var('REFERENCE_DV360_BIGQUERY_DATASET', 'dv360_raw') }}"
    tables:
      - name: dv360_standard
      - name: dv360_youtube

  - name: dv360_transformed
    database: "{{ env_var('DBT_BIGQUERY_PROJECT', 'squirrel-together-main') }}"
    schema: "{{ env_var('REFERENCE_DV360_TRANSFORMED_BIGQUERY_DATASET', 'dv360_transformed') }}"
    tables:
      - name: dv360_standard
      - name: dv360_youtube

  - name: facebook_raw
    database: "{{ env_var('DBT_BIGQUERY_PROJECT', 'squirrel-together-main') }}"
    schema: "{{ env_var('REFERENCE_META_BIGQUERY_DATASET', 'facebook_raw') }}"
    tables:
      - name: ads_insights
      - name: ad_sets
      - name: ads
      - name: campaigns
      - name: custom_conversions

  - name: facebook_transformed
    database: "{{ env_var('DBT_BIGQUERY_PROJECT', 'squirrel-together-main') }}"
    schema: "{{ env_var('REFERENCE_META_TRANSFORMED_BIGQUERY_DATASET', 'facebook_transformed') }}"
    tables:
      - name: facebook

  - name: ttd_raw
    database: "{{ env_var('DBT_BIGQUERY_PROJECT', 'squirrel-together-main') }}"
    schema: "{{ env_var('REFERENCE_TTD_RAW_BIGQUERY_DATASET', 'ttd_raw') }}"
    tables:
      - name: standard_streams

  - name: ttd_transformed
    database: "{{ env_var('DBT_BIGQUERY_PROJECT', 'squirrel-together-main') }}"
    schema: "{{ env_var('REFERENCE_TTD_TRANSFORMED_BIGQUERY_DATASET', 'ttd_transformed') }}"
    tables:
      - name: ttd_transformed

  - name: hivestack_raw
    database: "{{ env_var('DBT_BIGQUERY_PROJECT', 'squirrel-together-main') }}"
    schema: "{{ env_var('REFERENCE_HIVESTACK_BIGQUERY_DATASET', 'hivestack_raw') }}"
    tables:
      - name: squirrel
      - name: amp_report

  - name: hivestack_transformed
    database: "{{ env_var('DBT_BIGQUERY_PROJECT', 'squirrel-together-main') }}"
    schema: "{{ env_var('REFERENCE_HIVESTACK_TRANSFORMED_BIGQUERY_DATASET', 'hivestack_transformed') }}"
    tables:
      - name: hivestack

  - name: tiktok_raw
    database: "{{ env_var('DBT_BIGQUERY_PROJECT', 'squirrel-together-main') }}"
    schema: "{{ env_var('REFERENCE_TIKTOK_BIGQUERY_DATASET', 'tiktok_raw') }}"
    tables:
      - name: ads
      - name: ads_basic_data_metrics_by_day
      - name: ads_video_play_metrics_by_day

  - name: tiktok_transformed
    database: "{{ env_var('DBT_BIGQUERY_PROJECT', 'squirrel-together-main') }}"
    schema: "{{ env_var('REFERENCE_TIKTOK_TRANSFORMED_BIGQUERY_DATASET', 'tiktok_transformed') }}"
    tables:
      - name: tiktok

  - name: cm360_raw
    database: "{{ env_var('CM360_RAW_BIGQUERY_PROJECT', 'together-internal') }}"
    schema: "{{ env_var('REFERENCE_CM360_RAW_BIGQUERY_DATASET', 'cm360_raw') }}"
    tables:
      - name: cm360_report_stream

  - name: cm360_transformed
    database: "{{ env_var('DBT_BIGQUERY_PROJECT', 'squirrel-together-main') }}"
    schema: "{{ env_var('REFERENCE_CM360_TRANSFORMED_BIGQUERY_DATASET', 'cm360_transformed') }}"
    tables:
      - name: cm360_direct_buy
      - name: cm360_seralized

models:
  - name: facebook
    config:
      schema: "{{ env_var('META_SUFFIX', '') }}"
    columns:
      - name: media_cost
        tests:
          - testing_sum.expected_sum:
              expected_value: 14549.95
      - name: impressions
        tests:
          - testing_sum.expected_sum:
              expected_value: 2857616
      - name: clicks
        tests:
          - testing_sum.expected_sum:
              expected_value: 22450   
