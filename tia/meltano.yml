version: 1
default_environment: dev
project_id: 31aa7aff-61c8-4016-a35a-13d725dc019b
environments:
- name: dev
- name: staging
- name: prod
state_backend:
  uri: gs://tia-main-meltano-state-staging
plugins:
  extractors:
  - name: tap-dv360
    namespace: tap-dv360
    pip_url: git+https://github.com/Together-NZ/tap-dv360.git
    executable: tap-dv360
    capabilities:
    - state
    - catalog
    - discover
    - about
    - stream-maps
    config:
      start_date: ${START_DATE}
      advertiser_id: '1162537841'
      query_standard: dv360_standard.json
      query_youtube: dv360_youtube.json
      service_account: together-meltano@together-internal.iam.gserviceaccount.com
  - name: tap-ttd
    namespace: tap-ttd
    pip_url: git+https://github.com/Together-NZ/tap-ttd.git
    executable: tap-ttd
    config:
      api_key: ${TAP_TTD_API_KEY}
      start_date: ${START_DATE}
      end_date: ''
      manual: false
      advertiser_id: h1ukltr
  - name: tap-facebook
    variant: airbyte
    pip_url: git+https://github.com/MeltanoLabs/tap-airbyte-wrapper.git
    config:
      airbyte_config:
        start_date: ${START_DATE}T00:00:00Z
    select:
    - ads_insights_*.*
    - ad_account.*
    - ad_sets.*
    - ads.*
    - campaigns.*
  loaders:
  - name: target-bigquery
    variant: z3z1ma
    pip_url: git+https://github.com/z3z1ma/target-bigquery.git
    config:
      dataset: ${BQ_DATASET}
      project: tia-main
      location: australia-southeast1
      denormalized: false
      schema_resolver_version: 2
      column_name_transforms:
        add_underscore_when_invalid: true
        lower: true
        snake_case: true
      fail_fast: false
      method: ${BQ_METHOD}
      bucket: australia-southeast1-meltan-00c049c-bigquery-staging

  orchestrators:
  - name: airflow
    variant: apache
    pip_url: apache-airflow==2.10.5 --constraint 
      https://raw.githubusercontent.com/apache/airflow/constraints-2.10.5/constraints-${MELTANO__PYTHON_VERSION}.txt
  transformers:
  - name: dbt-bigquery
    variant: dbt-labs
    pip_url: dbt-core~=1.3.0 dbt-bigquery~=1.3.0
    commands:
      cm360_models:
        args: run --select cm360_seralized cm360_direct_buy