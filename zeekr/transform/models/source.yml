sources:

  - name: ga4_raw
    database: "{{ env_var('DBT_BIGQUERY_PROJECT', 'zeekr-main') }}"
    schema: "{{ env_var('REFERENCE_GA4_RAW_BIGQUERY_DATASET', 'ga4_raw') }}"
    tables:
      - name: goal




  - name: facebook_raw
    database: "{{ env_var('DBT_BIGQUERY_PROJECT', 'zeekr-main') }}"
    schema: "{{ env_var('REFERENCE_META_BIGQUERY_DATASET', 'facebook_raw') }}"
    tables:
      - name: ads_insights
      - name: ad_sets
      - name: ads
      - name: campaigns
      - name: custom_conversions

 

  - name: linkedin_raw
    database: "{{ env_var('DBT_BIGQUERY_PROJECT', 'zeekr-main') }}"
    schema: "{{ env_var('REFERENCE_LINKEDIN_BIGQUERY_DATASET', 'linkedin_raw') }}"
    tables:
      - name: ad_analytics_by_creative
      - name: creatives
      - name: campaigns
      - name: campaign_groups


  - name: ttd_raw
    database: "{{ env_var('DBT_BIGQUERY_PROJECT', 'zeekr-main') }}"
    schema: "{{ env_var('REFERENCE_TTD_TRANSFORMED_BIGQUERY_DATASET', 'ttd_raw') }}"
    tables:
      - name: standard_streams



  - name: dash_union
    database: "{{ env_var('DBT_BIGQUERY_PROJECT', 'zeekr-main') }}"
    schema: "{{ env_var('REFERENCE_DASH_UNION_BIGQUERY_DATASET', 'dash_table') }}"
    tables:
      - name: dash_table
      - name: dash_union

  - name: dash_union_search
    database: "{{ env_var('DBT_BIGQUERY_PROJECT', 'zeekr-main') }}"
    schema: "{{ env_var('REFERENCE_DASH_UNION_BIGQUERY_DATASET', 'dash_table_search') }}"
    tables:
      - name: dash_table_search

models:


  - name: ttd
    config: 
      schema: "{{ env_var('TTD_SUFFIX', '') }}"
    columns:
      - name: media_cost
        tests:
          - testing_sum.expected_sum:
              expected_value: 52112.58
      - name: impressions
        tests:
          - testing_sum.expected_sum:
              expected_value: 798906
      - name: clicks
        tests:
          - testing_sum.expected_sum:
              expected_value: 363


  - name: facebook
    config:
      schema: "{{ env_var('META_SUFFIX', '') }}"

    columns:
      - name: media_cost
        tests:
          - testing_sum.expected_sum:
              expected_value: 14549.95
      - name: impressions
        tests:
          - testing_sum.expected_sum:
              expected_value: 2857616
      - name: clicks
        tests:
          - testing_sum.expected_sum:
              expected_value: 22450
      



      
  - name: linkedin
    config:
      schema: "{{ env_var('LINKEDIN_SUFFIX','') }}"
    columns:
      - name: media_cost
        tests:
          - testing_sum.expected_sum:
              expected_value: 8327.91
      - name: impressions
        tests:
          - testing_sum.expected_sum:
              expected_value: 771281
      - name: clicks
        tests:
          - testing_sum.expected_sum:
              expected_value: 5785
