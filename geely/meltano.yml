version: 1
default_environment: dev
project_id: 4f5340fe-b63b-41b8-8b8a-963749a65dc3
environments:
- name: dev
- name: staging
  config:
    plugins:
      transformers:
      - name: dbt-bigquery
        env:
          DBT_BIGQUERY_PROJECT: together-internal
          DBT_BIGQUERY_LOCATION: australia-southeast1
          REFERENCE_META_BIGQUERY_DATASET: dbt_test_facebook
          REFERENCE_LINKEDIN_BIGQUERY_DATASET: dbt_test_linkedin
          REFERENCE_HIVESTACK_BIGQUERY_DATASET: dbt_test_hivestack
          REFERENCE_TTD_TRANSFORMED_BIGQUERY_DATASET: dbt_test_ttd  
          META_SUFFIX: dbt_test_facebook
          LINKEDIN_SUFFIX: dbt_test_linkedin
          HIVESTACK_SUFFIX: dbt_test_hivestack
          TTD_SUFFIX: dbt_test_ttd
          REPORT_NAME: amp_report
          PLAN_CODE: uow
- name: prod
#state_backend:
#  uri: gs://geely-meltano-state-staging
plugins:
  extractors:
  - name: tap-linkedin-ads
    namespace: tap-linkedin-ads
    pip_url: git+https://github.com/Together-NZ/tap-linkedin.git setuptools<82.0
    executable: tap-linkedin-ads
    capabilities:
    - state
    - catalog
    - discover
    - about
    - stream-maps
    config:
      access_token: ${TAP_LINKEDIN_ADS_ACCESS_TOKEN}
      refresh_token: ${TAP_LINKEDIN_ADS_REFRESH_TOKEN}
      client_id: ${TAP_LINKEDIN_ADS_CLIENT_ID}
      client_secret: ${TAP_LINKEDIN_ADS_CLIENT_SECRET}
      accounts: ${TAP_LINKEDIN_ADS_ACCOUNTS}
      user_agent: agent
      start_date: ${START_DATE}
      _catalog_path: ./catalog.json
    select:
      - campaigns.*
      - creatives.*
      - campaign_groups.*
      - ad_analytics_by_creative.*
  - name: tap-ga4
    variant: meltanolabs
    pip_url: git+https://github.com/MeltanoLabs/tap-google-analytics.git
    config:
      reports: report.json
      start_date: ${START_DATE}
      keep_empty_rows: true
      select:
      - goal
  - name: tap-ttd
    namespace: tap-ttd
    pip_url: git+https://github.com/Together-NZ/tap-ttd.git setuptools<82.0
    executable: tap-ttd
    config:
      api_key: ${TAP_TTD_API_KEY}
      start_date: ${START_DATE}
      end_date:
      manual: false
      advertiser_id: ${TAP_TTD_ADVERTISER_ID}
  - name: tap-hivestack
    namespace: tap-hivestack
   
    pip_url: git+ssh://git@github.com/Together-NZ/tap-hivestack.git setuptools<82.0
    executable: tap-hivestack
    config:
        api_key: ${TAP_HIVESTACK_API_KEY}
        report_id: '84171'
  - name: tap-facebook
    variant: airbyte
    pip_url: git+https://github.com/MeltanoLabs/tap-airbyte-wrapper.git setuptools<82.0
    config:
      airbyte_spec:
        image: airbyte/source-facebook-marketing
        tag: "3.0.12"
      airbyte_config:
        start_date: ${START_DATE}T00:00:00Z
    select:
    - ad_account.*
    - ad_sets.*
    - ads.*
    - campaigns.*
    - ads_insights.*


  loaders:
  - name: target-jsonl
    variant: andyh1203
    pip_url: target-jsonl
  - name: target-bigquery
    variant: z3z1ma
    pip_url: git+https://github.com/z3z1ma/target-bigquery.git setuptools<82.0
    config:
      dataset: ${BQ_DATASET}
      project: geely-main
      location: australia-southeast1
      denormalized: false
      schema_resolver_version: 2
      column_name_transforms:
        add_underscore_when_invalid: true
        lower: true
        snake_case: true
      fail_fast: false
      method: gcs_stage
      bucket: australia-southeast1-meltan-00c049c-bigquery-staging
  orchestrators:
  - name: airflow
    variant: apache
    pip_url: apache-airflow==2.10.5 --constraint 
      https://raw.githubusercontent.com/apache/airflow/constraints-2.10.5/constraints-${MELTANO__PYTHON_VERSION}.txt
  transformers:
  - name: dbt-bigquery
    variant: dbt-labs
    pip_url: dbt-core~=1.9.2 dbt-bigquery~=1.9.1 setuptools<82.0
    commands:
      ttd_geely_models:
        args: run --select +ttd__geely
      ttd_lotus_models:
        args: run --select +ttd__lotus
      facebook_geely_models:
        args: run --select +facebook__geely
      facebook_lotus_models:
        args: run --select +facebook__lotus
      ga4_geely_models:
        args: run --select +ga4_goal_a__geely +ga4_goal_channel__geely
      ga4_lotus_models:
        args: run --select +ga4_goal_a__lotus +ga4_goal_channel__lotus
      cm360_geely_models:
        args: run --select +cm360_seralized__geely +cm360_direct_buy__geely
      cm360_lotus_models:
        args: run --select +cm360_seralized__lotus +cm360_direct_buy__lotus
      google_ads_geely_models: 
        args: run --select +google_ads_search__geely +google_ads_demand__geely
      google_ads_lotus_models: 
        args: run --select +google_ads_search__lotus +google_ads_demand__lotus
      linkedin_geely_models:
        args: run --select +linkedin_no_creative__geely +linkedin__geely
      linkedin_lotus_models:
        args: run --select +linkedin_no_creative__lotus +linkedin__lotus
      hivestack_geely_models:
        args: run --select +hivestack__geely
      hivestack_lotus_models:
        args: run --select +hivestack__lotus
    config:
      project: geely-main
      location: australia-southeast1
      method: oauth
  files:
  - name: files-airflow
    variant: meltano
    pip_url: git+https://github.com/meltano/files-airflow.git
