version: 1
default_environment: dev
project_id: 4f5340fe-b63b-41b8-8b8a-963749a65dc3
environments:
- name: dev
- name: staging
- name: prod
#state_backend:
#  uri: gs://geely-meltano-state-staging
plugins:
  extractors:

  - name: tap-ga4
    variant: meltanolabs
    pip_url: git+https://github.com/MeltanoLabs/tap-google-analytics.git
    config:
      reports: report.json
      start_date: ${START_DATE}
      keep_empty_rows: true
      select:
      - goal
  - name: tap-ttd
    namespace: tap-ttd
    pip_url: git+https://github.com/Together-NZ/tap-ttd.git
    executable: tap-ttd
    config:
      api_key: ${TAP_TTD_API_KEY}
      start_date: ${START_DATE}
      end_date:
      manual: false
      advertiser_id: dhx29ef
  - name: tap-facebook
    variant: airbyte
    pip_url: git+https://github.com/MeltanoLabs/tap-airbyte-wrapper.git
    config:
      airbyte_config:
        start_date: ${START_DATE}T00:00:00Z
    select:
    - ads_insights_*.*
    - ad_account.*
    - ad_sets.*
    - ads.*
    - campaigns.*


  loaders:
  - name: target-jsonl
    variant: andyh1203
    pip_url: target-jsonl
  - name: target-bigquery
    variant: z3z1ma
    pip_url: git+https://github.com/z3z1ma/target-bigquery.git
    config:
      dataset: ${BQ_DATASET}
      project: geely-main
      location: australia-southeast1
      denormalized: false
      schema_resolver_version: 2
      column_name_transforms:
        add_underscore_when_invalid: true
        lower: true
        snake_case: true
      fail_fast: false
      method: gcs_stage
      bucket: australia-southeast1-meltan-00c049c-bigquery-staging
  orchestrators:
  - name: airflow
    variant: apache
    pip_url: apache-airflow==2.10.5 --constraint 
      https://raw.githubusercontent.com/apache/airflow/constraints-2.10.5/constraints-${MELTANO__PYTHON_VERSION}.txt
  transformers:
  - name: dbt-bigquery
    variant: dbt-labs
    pip_url: dbt-core~=1.9.2 dbt-bigquery~=1.9.1
    commands:
      ttd_models:
        args: run --select +ttd
      facebook_models:
        args: run --select +facebook
      ga4_models:
        args: run --select +ga4_goal_a +ga4_goal_channel
      cm360_models:
        args: run --select +cm360_seralized +cm360_direct_buy
      google_ads_models: 
        args: run --select +google_ads_search +google_ads_demand
    config:
      project: geely-main
      location: australia-southeast1
      method: oauth
  files:
  - name: files-airflow
    variant: meltano
    pip_url: git+https://github.com/meltano/files-airflow.git
