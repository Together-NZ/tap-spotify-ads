version: 1
default_environment: dev
project_id: 99085f13-d15c-4a8e-8ccb-8ac5bedb5411
environments:
- name: dev
- name: staging
- name: prod
state_backend:
  uri: gs://ballance-main-meltano-state-staging
plugins:
  extractors:
  - name: tap-ttd
    namespace: tap-ttd
    pip_url: git+https://github.com/Together-NZ/tap-ttd.git setuptools<82.0
    executable: tap-ttd
    config:
      api_key: ${TAP_TTD_API_KEY}
      start_date: ${START_DATE}
      end_date: ''
      manual: false
      advertiser_id: p8l58b7
  - name: tap-dv360
    namespace: tap-dv360
    pip_url: git+https://github.com/Together-NZ/tap-dv360.git setuptools<82.0
    executable: tap-dv360
    capabilities:
    - state
    - catalog
    - discover
    - about
    - stream-maps

    config:
      start_date: ${START_DATE}
      advertiser_id: '5263532'
      query_standard: query_standard.json
      query_youtube: query_youtube.json
      service_account: ${TAP_DV360_SERVICE_ACCOUNT} 
  - name: tap-ga4
    variant: meltanolabs
    pip_url: git+https://github.com/MeltanoLabs/tap-google-analytics.git setuptools<82.0
    config:
      reports: ./report.json
      start_date: ${START_DATE}
      keep_empty_rows: true
      select:
      - goal
  - name: tap-facebook
    variant: airbyte
    pip_url: git+https://github.com/MeltanoLabs/tap-airbyte-wrapper.git setuptools<82.0
    config:
      airbyte_config:
        start_date: ${START_DATE}T00:00:00Z
    select:
    - ads_insights
    - ad_account.*
    - ad_sets.*
    - ads.*
    - campaigns.*
  loaders:
  - name: target-bigquery
    variant: z3z1ma
    pip_url: git+https://github.com/z3z1ma/target-bigquery.git setuptools<82.0
    config:
      dataset: ${BQ_DATASET}
      project: ballance-main
      location: australia-southeast1
      denormalized: false
      schema_resolver_version: 2
      column_name_transforms:
        add_underscore_when_invalid: true
        lower: true
        snake_case: true
      fail_fast: false
      method: ${BQ_METHOD}
      bucket: australia-southeast1-meltan-00c049c-bigquery-staging
  orchestrators:
  - name: airflow
    variant: apache
    pip_url: apache-airflow==2.10.5 --constraint https://raw.githubusercontent.com/apache/airflow/constraints-2.10.5/constraints-${MELTANO__PYTHON_VERSION}.txt
  transformers:
  - name: dbt-bigquery
    variant: dbt-labs
    pip_url: dbt-core~=1.3.0 dbt-bigquery~=1.3.0 setuptools<82.0
    commands:
      google_ads_models:
        args: run --select +google_ads_search +google_ads_demand
      cm360_models: 
        args: run --select cm360_seralized cm360_direct_buy
      dv360_models: 
        args: run --select dv360_standard dv360_youtube
      facebook_brand_models: 
        args: run --select facebook__brand
      facebook_simp_models:
        args: run --select facebook__simp
      ttd_models: 
        args: run --select ttd_transformed
      ga4_models: 
        args: run --select ga4_goal_a ga4_goal_channel
  files:
  - name: files-airflow
    variant: meltano
    pip_url: git+https://github.com/meltano/files-airflow.git
