version: 1
default_environment: dev
project_id: 8c98d303-4044-4832-a832-27f39bfd17bc
environments:
- name: dev
- name: staging
- name: prod
state_backend:
  uri: gs://barfoot-main-meltano-state-staging

plugins:
  extractors:
  - name: tap-ga4
    variant: meltanolabs
    pip_url: git+https://github.com/MeltanoLabs/tap-google-analytics.git
    config:
      reports: ./report.json
      start_date: ${START_DATE}
      keep_empty_rows: true
      select:
      - goal
  - name: tap-linkedin-ads
    namespace: tap-linkedin-ads
    pip_url: git+https://github.com/Together-NZ/tap-linkedin.git
    executable: tap-linkedin-ads
    capabilities:
    - state
    - catalog
    - discover
    - about
    - stream-maps
    config:
      access_token: ${TAP_LINKEDIN_ADS_ACCESS_TOKEN}
      refresh_token: ${TAP_LINKEDIN_ADS_REFRESH_TOKEN}
      client_id: ${TAP_LINKEDIN_ADS_CLIENT_ID}
      client_secret: ${TAP_LINKEDIN_ADS_CLIENT_SECRET}
      accounts: '510105965'
      user_agent: agent
      start_date: ${START_DATE}
      _catalog_path: ./catalog.json
    select:
    - ad_analytics_by_creative.*
    - ad_analytics_by_campaign.*
  - name: tap-facebook
    variant: airbyte
    pip_url: git+https://github.com/MeltanoLabs/tap-airbyte-wrapper.git
    config:
      airbyte_config:
        start_date: ${START_DATE}T00:00:00Z
    select:
    - ads_insights
    - ad_account.*
    - ad_sets.*
    - ads.*
    - campaigns.*
  - name: tap-hivestack
    namespace: tap-hivestack
    pip_url: git+ssh://git@github.com/Together-NZ/tap-hivestack.git
    executable: tap-hivestack
    config:
      api_key: ${TAP_HIVESTACK_API_KEY}
      report_id: '67762'
  - name: tap-ttd
    namespace: tap-ttd
    pip_url: git+https://github.com/Together-NZ/tap-ttd.git
    executable: tap-ttd
    config:
      api_key: ${TAP_TTD_API_KEY}
      start_date: ${START_DATE}
      end_date:
      manual: false
      advertiser_id: xuepmxc
  - name: tap-dv360
    namespace: tap-dv360
    pip_url: git+https://github.com/Together-NZ/tap-dv360.git
    executable: tap-dv360
    capabilities:
    - state
    - catalog
    - discover
    - about
    - stream-maps
    config:
      start_date: ${START_DATE}
      advertiser_id: '673915639'
      query_standard: query_standard.json
      query_youtube: query_youtube.json
      service_account: ${TAP_DV360_SERVICE_ACCOUNT} 
  loaders:
  - name: target-jsonl
    variant: andyh1203
    pip_url: target-jsonl
  - name: target-bigquery
    variant: z3z1ma
    pip_url: git+https://github.com/z3z1ma/target-bigquery.git
    config:
      dataset: ${BQ_DATASET}
      project: barfoot-and-thompson-main
      location: australia-southeast1
      denormalized: false
      schema_resolver_version: 2
      column_name_transforms:
        add_underscore_when_invalid: true
        lower: true
        snake_case: true
      fail_fast: false
      method: streaming_insert
      bucket: australia-southeast1-meltan-00c049c-bigquery-staging
  orchestrators:
  - name: airflow
    variant: apache
    pip_url: apache-airflow==2.10.5 --constraint 
      https://raw.githubusercontent.com/apache/airflow/constraints-2.10.5/constraints-${MELTANO__PYTHON_VERSION}.txt
  transformers:
  - name: dbt-bigquery
    variant: dbt-labs
    pip_url: dbt-core~=1.3.0 dbt-bigquery~=1.3.0
    config:
      project: barfoot-and-thompson-main
      method: oauth
    commands:
      google_ads_models:
        args: run --select google_ads_search google_ads_demand
      cm360_models: run --select +cm360_seralized +cm360_direct_buy
      dv360_models:
        args: run --select dv360_standard dv360_youtube
        description: Run the DV360 ads model
      facebook_models:
        args: run --select facebook
        description: Run the Facebook ads model
      linkedin_models: 
        args: run --select linkedin
      ttd_models:
        args: run --select ttd_transformed
        description: Run the TTD ads model
      hivestack_models:
        args: run --select hivestack
        description: Run the Hivestack ads models
      ga4_models:
        args: run --select ga4_goal_a ga4_goal_channel
        description: Run the GA4 ads modelss
      dash_models: run --select +dash_table
  files:
  - name: files-airflow
    variant: meltano
    pip_url: git+https://github.com/meltano/files-airflow.git
